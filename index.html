<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lector Rápido · OCR Instantáneo</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- SDK de Monetag -->
    <script src='//libtl.com/sdk.js' data-zone='11195093' data-sdk='show_11195093'></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #FFF3E0 0%, #FFE0B5 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 248, 235, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 24px 20px 32px;
            border: 1px solid rgba(255, 215, 170, 0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #C25E2A, #E67E22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            color: #B45F2B;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* Zona de anuncio sutil integrada */
        .ad-container {
            margin-bottom: 20px;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FFF8E7, #FFE8CC);
            border: 1px solid #F0C78E;
            border-radius: 16px;
            padding: 8px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ad-label {
            font-size: 0.65rem;
            color: #B8956A;
            text-align: center;
            margin-bottom: 2px;
        }

        .upload-area {
            background: #FFF7EF;
            border: 2px dashed #E7B27D;
            border-radius: 32px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #FFF2E5;
            border-color: #D9954A;
        }

        .upload-icon {
            font-size: 52px;
            margin-bottom: 8px;
        }

        .file-input {
            display: none;
        }

        .preview-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 28px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            border: 3px solid #FAD6A5;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            padding: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #FFD39F;
            border-top: 4px solid #E67E22;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            color: #C76829;
            font-weight: 500;
            text-align: center;
        }

        .result-box {
            background: #FEF5E8;
            border-radius: 28px;
            padding: 18px;
            margin: 16px 0 12px;
            border: 1px solid #F3D9BF;
        }

        .result-label {
            font-weight: 600;
            color: #BA6E3D;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .result-text {
            background: #FFFBF5;
            border-radius: 20px;
            padding: 16px;
            font-size: 1rem;
            line-height: 1.45;
            color: #3E2A1F;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .copy-btn {
            background: linear-gradient(95deg, #E67E22, #F39C12);
            border: none;
            width: 100%;
            padding: 14px 0;
            border-radius: 44px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 12px rgba(230, 126, 34, 0.3);
        }

        .copy-btn:active {
            transform: scale(0.97);
        }

        .copy-btn.copied {
            background: linear-gradient(95deg, #2E7D32, #43A047);
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #C28A59;
            margin-top: 24px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C2A24;
            color: #FFE3C9;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 999;
        }

        .error-box {
            background: #FFE0D9;
            border: 1px solid #FF9F8C;
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
            color: #C0392B;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>⚡ Lector Rápido</h1>
            <p>Sube una foto · texto en segundos</p>
        </div>

        <!-- Contenedor para el anuncio de Monetag - Banner sutil -->
        <div class="ad-container" id="monetagBanner">
            <div>
                <div class="ad-label">Publicidad</div>
                <!-- Aquí se cargará el banner de Monetag -->
            </div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸✨</div>
            <span>Toca para elegir imagen</span>
            <input type="file" id="fileInput" class="file-input" accept="image/jpeg, image/png, image/jpg, image/webp">
        </div>

        <div id="previewContainer" class="preview-container" style="display: none;"></div>
        
        <div id="loader" style="display: none;" class="loader">
            <div class="spinner"></div>
            <div class="status-text" id="statusMessage">🔍 Procesando imagen...</div>
        </div>

        <div id="resultSection" style="display: none;">
            <div class="result-box">
                <div class="result-label">📝 Texto extraído:</div>
                <div class="result-text" id="extractedText"></div>
            </div>
            <button class="copy-btn" id="copyButton">
                📋 Copiar texto
            </button>
        </div>
        
        <footer>Procesamiento en la nube · resultados rápidos 🌤️</footer>
    </div>
    <div id="toastMsg" class="toast">📋 ¡Copiado!</div>

    <script>
        // Control de frecuencia para anuncios intersticiales (Pop-under)
        let conversionCount = parseInt(localStorage.getItem('ocrConversionCount') || '0');
        let nextInterstitialThreshold = parseInt(localStorage.getItem('ocrNextInterstitial') || '0');

        // Configurar umbral aleatorio entre 6-10 conversiones para intersticial
        function resetInterstitialThreshold() {
            nextInterstitialThreshold = Math.floor(Math.random() * 5) + 6; // 6 a 10
            localStorage.setItem('ocrNextInterstitial', nextInterstitialThreshold.toString());
        }

        if (nextInterstitialThreshold === 0) {
            resetInterstitialThreshold();
        }

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const loaderDiv = document.getElementById('loader');
        const resultSection = document.getElementById('resultSection');
        const extractedTextSpan = document.getElementById('extractedText');
        const copyBtn = document.getElementById('copyButton');
        const toast = document.getElementById('toastMsg');
        const statusMessage = document.getElementById('statusMessage');

        // Función para cargar anuncio intersticial de forma sutil
        async function showInterstitialIfNeeded() {
            if (conversionCount >= nextInterstitialThreshold) {
                try {
                    // El SDK de Monetag se encargará de mostrar el intersticial
                    // cuando detecte la conversión apropiada
                    if (window.show_11195093) {
                        // Forzar un pop-under o intersticial de forma controlada
                        const adEvent = new CustomEvent('monetag-interstitial', {
                            detail: { zone: '11195093', type: 'interstitial' }
                        });
                        window.dispatchEvent(adEvent);
                    }
                    
                    // Esperar un momento para no ser invasivo
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                } catch (error) {
                    console.log('Anuncio intersticial no disponible');
                }
                
                // Resetear contadores
                conversionCount = 0;
                localStorage.setItem('ocrConversionCount', '0');
                resetInterstitialThreshold();
            }
        }

        function showToast(msg, isError = false) {
            toast.textContent = msg || (isError ? '❌ Error' : '📋 ¡Copiado!');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        async function copyTextToClipboard(text) {
            if (!text || text.trim() === '') {
                showToast('📭 No hay texto para copiar', true);
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '✅ ¡Copiado!';
                showToast('📋 Texto copiado');
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '📋 Copiar texto';
                }, 2000);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('📋 Copiado');
            }
        }

        // Función para convertir imagen a Base64
        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // API gratuita de OCR.space (1500 peticiones/mes gratis)
        async function extractTextWithOCRspace(base64Image) {
            const apiKey = 'K87489118088957';
            const formData = new FormData();
            formData.append('base64Image', `data:image/jpeg;base64,${base64Image}`);
            formData.append('language', 'spa');
            formData.append('isOverlayRequired', 'false');
            formData.append('detectOrientation', 'true');
            formData.append('scale', 'true');
            formData.append('OCREngine', '2');
            
            const response = await fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                headers: {
                    'apikey': apiKey
                },
                body: formData
            });
            
            const data = await response.json();
            if (data.IsErroredOnProcessing) {
                throw new Error(data.ErrorMessage || 'Error en OCR');
            }
            
            if (data.ParsedResults && data.ParsedResults.length > 0) {
                const text = data.ParsedResults[0].ParsedText;
                return text.trim() || '😕 No se encontró texto en la imagen';
            }
            return '😕 No se pudo leer el texto';
        }

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('Por favor selecciona una imagen');
                return;
            }
            
            // Mostrar preview
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgPreview = document.createElement('img');
                imgPreview.src = e.target.result;
                imgPreview.classList.add('preview-img');
                previewContainer.innerHTML = '';
                previewContainer.appendChild(imgPreview);
                previewContainer.style.display = 'flex';
            };
            reader.readAsDataURL(file);
            
            // Resetear UI
            resultSection.style.display = 'none';
            loaderDiv.style.display = 'flex';
            statusMessage.textContent = '📤 Subiendo imagen...';
            
            try {
                statusMessage.textContent = '🔍 Reconociendo texto...';
                const base64 = await imageToBase64(file);
                const text = await extractTextWithOCRspace(base64);
                
                extractedTextSpan.innerText = text;
                resultSection.style.display = 'block';
                
                if (text.includes('No se encontró') || text.includes('No se pudo')) {
                    statusMessage.textContent = '⚠️ Texto no encontrado';
                } else {
                    statusMessage.textContent = '✅ ¡Texto listo!';
                    
                    // Incrementar contador de conversiones exitosas
                    conversionCount++;
                    localStorage.setItem('ocrConversionCount', conversionCount.toString());
                    
                    // Mostrar intersticial cada 6-10 conversiones
                    await showInterstitialIfNeeded();
                }
            } catch (error) {
                console.error('Error:', error);
                extractedTextSpan.innerText = '❌ Error al procesar. Intenta con otra imagen más clara.';
                resultSection.style.display = 'block';
                statusMessage.textContent = '❌ Error';
            } finally {
                setTimeout(() => {
                    loaderDiv.style.display = 'none';
                }, 500);
            }
        });

        copyBtn.addEventListener('click', () => {
            const text = extractedTextSpan.innerText;
            if (text && !text.includes('Error') && !text.includes('No se encontró')) {
                copyTextToClipboard(text);
            } else {
                showToast('📭 No hay texto válido para copiar', true);
            }
        });

        // Telegram WebApp
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.expand();
            Telegram.WebApp.ready();
        }

        // Log para verificar que el SDK de Monetag se cargó
        console.log('✅ Monetag SDK cargado - Zone: 11195093');
        console.log(`📊 Próximo intersticial en: ${nextInterstitialThreshold - conversionCount} conversiones`);
    </script>
</body>
</html>
