<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum Legends | Diamond Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --fire: #ff4e00; --fire-glow: #ec9f05; --metal: #2c2c2c; --panel: rgba(10, 10, 10, 0.98); --gold: #FFD700; --red: #ff3333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        body { background: #000 url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden; }
        .app-shell { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://img.freepik.com/free-photo/fire-sparks-background_23-2148817294.jpg'); background-size: cover; width: 100%; max-width: 450px; height: 95vh; border: 3px solid var(--fire); border-radius: 20px; position: relative; display: flex; flex-direction: column; box-shadow: inset 0 0 30px rgba(255, 78, 0, 0.4); }
        .top-bar { padding: 20px; display: flex; align-items: center; background: rgba(20,20,20,0.95); border-bottom: 2px solid var(--fire); }
        .avatar-circle { width: 50px; height: 50px; border: 2px solid var(--fire); border-radius: 50%; background: #222; margin-right: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--fire); font-size: 1.5rem; }
        .user-info h2 { font-family: 'Bebas Neue'; font-size: 1.4rem; letter-spacing: 1px; }
        .user-info p { font-size: 0.85rem; color: var(--fire-glow); font-weight: 700; }
        .main-panel { flex: 1; padding: 15px; overflow-y: auto; background: rgba(0, 0, 0, 0.4); }
        .panel-title { font-family: 'Bebas Neue'; font-size: 1.5rem; border-left: 5px solid var(--fire); padding-left: 12px; margin-bottom: 20px; }
        .mission-item { background: linear-gradient(90deg, #1a1a1a 0%, #252525 100%); border: 1px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; padding: 15px; margin-bottom: 12px; cursor: pointer; }
        .mission-item.completed { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .mission-data b { display: block; font-size: 1rem; color: #eee; }
        .mission-data span { font-size: 0.75rem; color: var(--fire-glow); font-weight: bold; }
        .btn-deploy { background: var(--fire); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 700; }
        .footer-exchange { padding: 20px; background: #0a0a0a; border-top: 2px solid var(--fire); }
        .btn-claim-main { background: linear-gradient(to right, #ff4e00, #ec9f05); width: 100%; padding: 18px; border: none; border-radius: 8px; color: white; font-family: 'Bebas Neue'; font-size: 1.6rem; letter-spacing: 2px; cursor: pointer; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: var(--panel); padding: 35px; text-align: center; backdrop-filter: blur(10px); }
        .withdraw-card { width: 100%; border: 2px solid var(--fire); border-radius: 15px; padding: 25px; background: #111; }
        .withdraw-card h3 { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--gold); margin-bottom: 15px; }
        .input-gamer { width: 100%; background: #000; border: 1px solid #444; padding: 15px; color: #fff; border-radius: 8px; margin-bottom: 15px; font-size: 1.1rem; text-align: center; }
        .status-msg { font-size: 0.9rem; margin-bottom: 20px; font-weight: bold; }
        .msg-error { color: var(--red); }
        .msg-ready { color: #00ff00; }
        .btn-confirm { background: var(--fire); color: #fff; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-confirm:disabled { background: #444; cursor: not-allowed; }
        .modal-title { font-family: 'Bebas Neue'; font-size: 3rem; margin-bottom: 10px; }
        .btn-close-modal { background: #fff; color: #000; border: none; padding: 12px 30px; font-weight: 700; border-radius: 5px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-shell">
    <div id="failScreen" class="overlay" style="color: var(--red);">
        <h2 class="modal-title">¡FALLO!</h2>
        <p>Debes esperar los 10 segundos en la web. ¡No te rindas!</p>
        <button class="btn-close-modal" onclick="closeOverlay('failScreen')">REINTENTAR</button>
    </div>
    <div id="winScreen" class="overlay">
        <h2 class="modal-title" style="color: #00ff00;">¡ÉXITO!</h2>
        <p>+10 Estrellas añadidas a tu cuenta.</p>
        <button class="btn-close-modal" style="background:#00ff00" onclick="closeOverlay('winScreen')">ACEPTAR</button>
    </div>
    <div id="withdrawOverlay" class="overlay">
        <div class="withdraw-card">
            <h3>RETIRAR DIAMANTES</h3>
            <p style="font-size: 0.8rem; opacity: 0.6;">TU BALANCE</p>
            <p style="font-size: 1.5rem; color: var(--gold); margin-bottom: 15px;"><span id="balOverlay">0</span> ⭐</p>
            <div id="withdrawStatus" class="status-msg"></div>
            <input type="number" id="playerID" class="input-gamer" placeholder="ID JUGADOR FF">
            <button id="btnConfirmWithdraw" class="btn-confirm" onclick="finalizarRetiro()">SOLICITAR</button>
            <p onclick="closeOverlay('withdrawOverlay')" style="margin-top:20px; font-size: 0.8rem; cursor:pointer; opacity: 0.5;">CANCELAR</p>
        </div>
    </div>
    <header class="top-bar"><div class="avatar-circle">👤</div><div class="user-info"><h2>OPERADOR_FF</h2><p>SALDO: <span id="balanceText">0</span> ⭐ | <span id="diamText">0</span> 💎</p></div></header>
    <main class="main-panel"><h3 class="panel-title">MISIONES</h3><div id="missionGrid"></div></main>
    <footer class="footer-exchange"><button class="btn-claim-main" onclick="openWithdraw()">CANJEAR RECOMPENSA</button></footer>
</div>
<script>
    const SETTINGS = { AD_LINK: "https://www.google.com", REQUIRED_TIME: 10, GOAL: 5000 };
    let stars = parseInt(localStorage.getItem('al_stars')) || 0;
    let inProgress = false; let lastNode = null;
    function init() { renderMissions(); updateDisplay(); }
    function renderMissions() {
        const grid = document.getElementById('missionGrid'); grid.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const last = localStorage.getItem(`al_node_${i}`);
            const isDone = last && (new Date().getTime() - last < 86400000);
            const div = document.createElement('div'); div.className = `mission-item ${isDone ? 'completed' : ''}`;
            div.innerHTML = `<div class="mission-data"><b>OPERACIÓN 0${i}</b><span>+10 ESTRELLAS</span></div><button class="btn-deploy">${isDone ? 'LISTO' : 'IR'}</button>`;
            div.onclick = () => { if(!isDone && !inProgress) { inProgress = true; lastNode = id=i; window.open(SETTINGS.AD_LINK, '_blank'); setTimeout(() => { if(inProgress) grantReward(); }, SETTINGS.REQUIRED_TIME * 1000); } };
            grid.appendChild(div);
        }
    }
    window.onfocus = () => { if(inProgress) { inProgress = false; document.getElementById('failScreen').style.display = 'flex'; } };
    function grantReward() { inProgress = false; stars += 10; localStorage.setItem(`al_node_${lastNode}`, new Date().getTime()); updateDisplay(); renderMissions(); document.getElementById('winScreen').style.display = 'flex'; }
    function updateDisplay() { document.getElementById('balanceText').innerText = stars; document.getElementById('balOverlay').innerText = stars; document.getElementById('diamText').innerText = (stars/10); localStorage.setItem('al_stars', stars); }
    function openWithdraw() {
        const s = document.getElementById('withdrawStatus'); const b = document.getElementById('btnConfirmWithdraw');
        if(stars < SETTINGS.GOAL) { s.innerHTML = `<span class="msg-error">❌ MÍNIMO: 5,000 ⭐</span>`; b.disabled = true; } 
        else { s.innerHTML = `<span class="msg-ready">✅ LISTO PARA RETIRAR</span>`; b.disabled = false; }
        document.getElementById('withdrawOverlay').style.display = 'flex';
    }
    function finalizarRetiro() { const id = document.getElementById('playerID').value; if(id.length < 5) { alert("ID CORTO"); return; } alert("SOLICITUD ENVIADA"); closeOverlay('withdrawOverlay'); }
    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
    init();
</script>
</body>
</html>
