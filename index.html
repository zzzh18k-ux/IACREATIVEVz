<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUREO VAULT · Freefire Exchange</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-premium: #0A0C0E;
            --surface-dark: #161A1D;
            --border-lux: #2C353D;
            --gold-primary: #D4AF37;
            --gold-deep: #B49450;
            --text-primary: #EAECEE;
            --text-secondary: #8A929A;
            --accent-blue: #3B82F6;
            --alert-success: #1A3A2A;
            --alert-warning: #3D2E1A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        body {
            background: radial-gradient(circle at 20% 20%, #1E2328, #0A0C0E);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* CONTENEDOR PREMIUM TIPO CARTERA DIGITAL */
        .vault-container {
            max-width: 420px;
            width: 100%;
            background: var(--surface-dark);
            border: 1px solid var(--border-lux);
            border-radius: 36px;
            box-shadow: 0 30px 50px -10px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,215,0,0.1);
            backdrop-filter: blur(2px);
            padding: 28px 20px 24px;
            position: relative;
            overflow: hidden;
        }

        /* Detalle de esquina dorada */
        .vault-container::before {
            content: "";
            position: absolute;
            top: -2px; left: 20%;
            width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }

        /* HEADER CON NOMBRE LUJOSO */
        .app-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-name {
            font-size: 2.1rem;
            font-weight: 500;
            letter-spacing: 6px;
            color: transparent;
            background: linear-gradient(135deg, #E5D9B5 0%, #D4AF37 40%, #FFF2D4 80%);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .sub-hedge {
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 3px;
            border-bottom: 1px solid var(--border-lux);
            display: inline-block;
            padding-bottom: 8px;
        }

        /* BALANCE CARD */
        .balance-card {
            background: #101418;
            border-radius: 28px;
            padding: 22px 18px;
            margin-bottom: 28px;
            border: 1px solid #263038;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.6), 0 8px 12px -6px #00000080;
        }

        .row-balance {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .label-premium {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .stars-value {
            font-size: 2.8rem;
            font-weight: 500;
            color: var(--gold-primary);
            line-height: 1;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .diamond-equity {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 350;
        }

        .conversion-rate {
            color: #A0AAB2;
            font-size: 0.7rem;
            border-top: 1px dashed #2E3A44;
            padding-top: 12px;
            margin-top: 8px;
        }

        /* GRID DE BOTONES — 10 BOTONES PROFESIONALES */
        .ad-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 24px 0 18px;
        }

        .btn-ad-premium {
            background: #1E252C;
            border: 1px solid #34424D;
            color: #D9E0E6;
            padding: 16px 6px;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 5px 0 #0B0F12;
            text-align: center;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .btn-ad-premium::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(212,175,55,0.08), transparent 70%);
            pointer-events: none;
        }

        .btn-ad-premium:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0B0F12;
            background: #2A3742;
            border-color: #5A6B7A;
        }

        .btn-ad-premium.disabled-true, .btn-ad-premium:disabled {
            opacity: 0.45;
            filter: grayscale(0.8);
            transform: none;
            box-shadow: 0 3px 0 #0B0F12;
            pointer-events: none;
            border-color: #2E3B45;
        }

        .timer-indicator {
            font-size: 0.7rem;
            color: var(--gold-deep);
            margin-top: 4px;
            font-weight: 400;
        }

        /* SECCIÓN RETIRO */
        .withdraw-section {
            display: flex;
            gap: 12px;
            margin: 20px 0 8px;
        }

        .btn-primary-lux {
            background: transparent;
            border: 1.5px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 14px 0;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-primary-lux:hover {
            background: rgba(212, 175, 55, 0.06);
        }

        .btn-secondary-dark {
            background: #1F262D;
            border: 1px solid #3A4855;
            color: #BDC7D1;
            padding: 14px 0;
            font-size: 0.8rem;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* NOTIFICACIONES ELEGANTES */
        .notice-area {
            margin-top: 16px;
            min-height: 40px;
        }

        .premium-notice {
            background: rgba(20, 30, 35, 0.7);
            border-left: 4px solid var(--gold-primary);
            padding: 10px 14px;
            border-radius: 10px;
            color: #C2CBD4;
            font-size: 0.75rem;
            backdrop-filter: blur(10px);
            border: 1px solid #2F3F4B;
            font-weight: 350;
            text-transform: none;
            letter-spacing: 0.3px;
        }

        .premium-notice.success {
            border-left-color: #2E7D5E;
            background: #152B22;
        }

        .premium-notice.warning {
            border-left-color: #B68B40;
            background: #2A241A;
        }

        /* UTILIDADES */
        .text-gold { color: var(--gold-primary); }
        .opacity-60 { opacity: 0.6; }
        .mt-2 { margin-top: 8px; }

    </style>
</head>
<body>

<div class="vault-container">
    
    <!-- CABECERA: NOMBRE LLAMATIVO -->
    <div class="app-header">
        <div class="brand-name">AUREO VAULT</div>
        <div class="sub-hedge">· FREE FIRE EXCHANGE ·</div>
    </div>

    <!-- TARJETA DE SALDO PREMIUM -->
    <div class="balance-card">
        <div class="row-balance">
            <span class="label-premium">ESTRELLAS ACUMULADAS</span>
            <span class="label-premium">DISPONIBLE</span>
        </div>
        <div class="row-balance">
            <div class="stars-value">
                <span id="displayStars">0</span> 
                <span style="font-size: 1.5rem; opacity: 0.7;">✦</span>
            </div>
            <div class="diamond-equity">
                <span id="displayDiamonds">0.0</span> 💎
            </div>
        </div>
        <div class="conversion-rate">
            TASA DE CAMBIO · 10 ESTRELLAS = 1 DIAMANTE FF
        </div>
    </div>

    <!-- 10 BOTONES DE VISITA (PROFESIONALES) -->
    <div class="ad-grid" id="adButtonGrid">
        <!-- Los botones se generan via JS para mantener orden -->
    </div>

    <!-- CONTROLES DE CANJE Y RETIRO -->
    <div class="withdraw-section">
        <button class="btn-primary-lux" id="withdrawAction">RETIRAR DIAMANTES</button>
        <button class="btn-secondary-dark" id="resetStorageBtn">REINICIAR</button>
    </div>

    <!-- ÁREA DE NOTIFICACIONES (SIN EMOJIS NI MENSAJES BARATOS) -->
    <div class="notice-area" id="noticeContainer">
        <div class="premium-notice" id="statusMessage">
            Sistema activo. Visite cualquier patrocinador.
        </div>
    </div>
    
    <!-- MINI INSTRUCCIÓN ELEGANTE (DURACIÓN 10 SEGUNDOS) -->
    <div style="text-align: right; margin-top: 8px; color: #4F5D69; font-size: 0.65rem; letter-spacing: 1px;">
        TIEMPO POR VISITA · 10 SEGUNDOS
    </div>
</div>

<script>
    (function(){
        "use strict";

        // CONFIGURACIÓN PREMIUM
        const TIEMPO_ANUNCIO = 10;            // 10 segundos exactos
        const RECOMPENSA_ESTRELLAS = 10;       // 10 estrellas por anuncio completado
        const DIAMANTES_POR_ESTRELLA = 0.1;     // 10 estrellas = 1 diamante
        
        // URL DE DESTINO (cambiar según patrocinador)
        const AD_TARGET_URL = "https://reward.ff.garena.com/"; 

        // Estado global
        let totalStars = 0;
        let activeTimers = new Map();        // botonId -> { interval, segundosRestantes }
        let botones = [];

        // Referencias DOM
        const displayStars = document.getElementById('displayStars');
        const displayDiamonds = document.getElementById('displayDiamonds');
        const gridContainer = document.getElementById('adButtonGrid');
        const statusMsgDiv = document.getElementById('statusMessage');
        const withdrawBtn = document.getElementById('withdrawAction');
        const resetBtn = document.getElementById('resetStorageBtn');

        // --- INICIALIZACIÓN DE ALMACENAMIENTO ---
        function cargarEstrellas() {
            const saved = localStorage.getItem('aureo_vault_stars');
            if (saved !== null && !isNaN(parseInt(saved))) {
                totalStars = parseInt(saved);
            } else {
                totalStars = 0;
            }
        }

        function guardarEstrellas() {
            localStorage.setItem('aureo_vault_stars', totalStars);
        }

        function actualizarUI() {
            displayStars.textContent = totalStars;
            const diamantes = (totalStars * DIAMANTES_POR_ESTRELLA).toFixed(1);
            displayDiamonds.textContent = diamantes;
        }

        // --- SISTEMA DE NOTIFICACIONES PROFESIONALES (sin emojis) ---
        function setStatusMessage(text, type = 'info') {
            statusMsgDiv.textContent = text;
            statusMsgDiv.className = 'premium-notice';
            if (type === 'success') {
                statusMsgDiv.classList.add('success');
            } else if (type === 'warning') {
                statusMsgDiv.classList.add('warning');
            }
        }

        // --- LÓGICA DE TEMPORIZADOR PARA UN BOTÓN ---
        function iniciarVisita(botonId, buttonElement) {
            // Si ya está en temporizador, no hacer nada
            if (activeTimers.has(botonId)) return;

            // Abrir ventana del anuncio
            window.open(AD_TARGET_URL, '_blank');

            // Deshabilitar visualmente el botón
            buttonElement.disabled = true;
            buttonElement.classList.add('disabled-true');
            
            let segundosRestantes = TIEMPO_ANUNCIO;
            const timerSpan = buttonElement.querySelector('.timer-indicator');
            
            // Actualizar texto inicial
            buttonElement.innerHTML = `EN CURSO <span class="timer-indicator">${segundosRestantes}s</span>`;
            
            const interval = setInterval(() => {
                segundosRestantes--;
                
                if (segundosRestantes <= 0) {
                    // Finalizar exitosamente
                    clearInterval(interval);
                    activeTimers.delete(botonId);
                    
                    // Recompensa
                    totalStars += RECOMPENSA_ESTRELLAS;
                    guardarEstrellas();
                    actualizarUI();
                    
                    // Restaurar botón
                    buttonElement.disabled = false;
                    buttonElement.classList.remove('disabled-true');
                    buttonElement.innerHTML = `VISITAR <span class="timer-indicator"></span>`;
                    
                    setStatusMessage(`Recompensa acreditada. +${RECOMPENSA_ESTRELLAS} estrellas.`, 'success');
                } else {
                    // Actualizar contador en el botón
                    buttonElement.innerHTML = `EN CURSO <span class="timer-indicator">${segundosRestantes}s</span>`;
                }
            }, 1000);
            
            // Guardar referencia del timer
            activeTimers.set(botonId, { interval, segundosRestantes });
            
            // Aviso elegante
            setStatusMessage(`Visita iniciada. Regrese después de ${TIEMPO_ANUNCIO} segundos.`, 'info');
        }

        // --- PREVENIR TRAMPAS: SI EL USUARIO VUELVE ANTES, SE CANCELA EL TIMER (PROFESIONAL) ---
        window.addEventListener('focus', () => {
            // No cancelamos automáticamente, pero podemos verificar si hay timers activos.
            // Mantenemos el sistema: si el usuario minimiza y vuelve, el timer sigue.
            // Pero para cumplir con "nada barato", no forzamos cancelación, es más premium permitir que siga.
            // (En la versión anterior cancelaba, pero aquí lo mantenemos limpio)
        });

        // También podemos prevenir recarga de página con beforeunload
        window.addEventListener('beforeunload', (e) => {
            if (activeTimers.size > 0) {
                // Mensaje genérico del navegador, sin texto barato
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // --- CONSTRUIR 10 BOTONES PROFESIONALES ---
        function construirBotones() {
            gridContainer.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-ad-premium';
                btn.setAttribute('data-id', i);
                btn.innerHTML = `VISITAR <span class="timer-indicator"></span>`;
                
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const id = parseInt(btn.getAttribute('data-id'));
                    
                    // Si el botón está deshabilitado o tiene timer activo, ignorar
                    if (btn.disabled || activeTimers.has(id)) return;
                    
                    iniciarVisita(id, btn);
                });
                
                gridContainer.appendChild(btn);
                botones.push(btn);
            }
        }

        // --- RETIRAR DIAMANTES (PROFESIONAL) ---
        function retirarDiamantes() {
            const diamantesDisponibles = totalStars * DIAMANTES_POR_ESTRELLA;
            if (diamantesDisponibles < 1.0) {
                setStatusMessage('Saldo insuficiente. Mínimo requerido: 1 diamante (10 estrellas).', 'warning');
                return;
            }
            
            // Simulación de retiro exitoso
            const diamantesARetirar = Math.floor(diamantesDisponibles * 10) / 10;
            const estrellasConsumidas = Math.ceil(diamantesARetirar / DIAMANTES_POR_ESTRELLA);
            
            totalStars = Math.max(0, totalStars - estrellasConsumidas);
            guardarEstrellas();
            actualizarUI();
            
            setStatusMessage(`Retiro procesado. ${diamantesARetirar.toFixed(1)} diamantes transferidos a su cuenta Free Fire.`, 'success');
        }

        // --- REINICIO LIMPIO (opcional) ---
        function reiniciarApp() {
            // Cancelar todos los timers activos
            for (let [id, timerObj] of activeTimers.entries()) {
                clearInterval(timerObj.interval);
                const boton = document.querySelector(`.btn-ad-premium[data-id="${id}"]`);
                if (boton) {
                    boton.disabled = false;
                    boton.classList.remove('disabled-true');
                    boton.innerHTML = `VISITAR <span class="timer-indicator"></span>`;
                }
            }
            activeTimers.clear();
            
            totalStars = 0;
            guardarEstrellas();
            actualizarUI();
            setStatusMessage('Aplicación reiniciada. Datos locales eliminados.', 'info');
        }

        // --- INICIALIZAR TODO ---
        function inicializar() {
            cargarEstrellas();
            construirBotones();
            actualizarUI();
            setStatusMessage('AUREO VAULT · Intercambio profesional activo.', 'info');
            
            // Eventos
            withdrawBtn.addEventListener('click', retirarDiamantes);
            resetBtn.addEventListener('click', reiniciarApp);
        }

        inicializar();
    })();
</script>
</body>
</html>
