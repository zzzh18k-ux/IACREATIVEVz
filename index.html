<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USDT GIFT K</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #fdf5e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            background: rgba(255,255,255,0.4);
            border-radius: 40px;
            padding: 25px;
            backdrop-filter: blur(5px);
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .badge {
            background: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            color: #d37a5a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .balance {
            text-align: center;
            margin: 20px 0;
        }
        #user-balance {
            font-size: 55px;
            font-weight: 800;
            color: #5d4037;
        }
        .balance-label {
            font-size: 12px;
            color: #a08a7a;
            letter-spacing: 3px;
        }

        /* COFRE */
        .chest {
            background: linear-gradient(145deg, #e8c89a, #d4a86a);
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            border: 3px solid #ffcc00;
            transition: transform 0.05s;
        }
        .chest:active { transform: scale(0.95); }
        .chest i { font-size: 80px; color: #ffdd99; text-shadow: 2px 2px 0 #b8860b; }
        .chest span { margin-top: 15px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; color: white; }

        /* BARRA */
        .progress-area { margin: 20px 0; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #d37a5a, #e68d71);
            border-radius: 20px;
            transition: width 0.3s;
        }
        .clicks-text { text-align: center; margin-top: 8px; font-size: 13px; color: #d37a5a; font-weight: bold; }

        /* BOTÓN DOBLAR */
        .double-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin: 15px 0 10px 0;
            cursor: pointer;
        }
        .double-btn.disabled {
            background: #95a5a6;
            opacity: 0.6;
            pointer-events: none;
        }

        .info {
            text-align: center;
            background: white;
            padding: 12px;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 13px;
            font-weight: bold;
            color: #27ae60;
        }

        .timer {
            text-align: center;
            font-size: 12px;
            color: #d37a5a;
            margin: 10px 0;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .menu-btn {
            background: white;
            border: none;
            padding: 14px 18px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .menu-btn:active { transform: scale(0.97); }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="top-nav">
        <div class="badge"><i class="fas fa-fire"></i> <span id="streak-count">0</span> DIAS</div>
        <div class="badge"><i class="fas fa-users"></i> <span id="active-users">...</span></div>
    </div>

    <div class="balance">
        <div id="user-balance">0.0000</div>
        <div class="balance-label">USDT</div>
    </div>

    <!-- COFRE -->
    <div class="chest" id="chest">
        <i class="fas fa-box-open"></i>
        <span>TOCA AQUÍ</span>
    </div>

    <!-- BARRA -->
    <div class="progress-area">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="clicks-text" id="clicksText">0 / 10 clicks</div>
    </div>

    <!-- BOTÓN DOBLAR (UNO SOLO) -->
    <button class="double-btn" id="doubleBtn">💰 DOBLAR</button>

    <div class="info" id="info">Multiplicador: 1x | Veces: 0/5</div>
    <div class="timer" id="timer">Reinicio en 50:00</div>

    <div class="menu-grid">
        <button class="menu-btn" id="inviteBtn"><span><i class="fas fa-heart"></i> Crecer Equipo</span> <i class="fas fa-chevron-right"></i></button>
        <button class="menu-btn" id="withdrawBtn"><span><i class="fas fa-coins"></i> Mi Cosecha</span> <i class="fas fa-chevron-right"></i></button>
        <button class="menu-btn" id="redeemBtn"><span><i class="fas fa-ticket-alt"></i> Canjea Código</span> <i class="fas fa-chevron-right"></i></button>
        <button class="menu-btn" id="leaderboardBtn"><span><i class="fas fa-trophy"></i> Top Usuarios</span> <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALWJpB7Ut2s-JUcC7hhXODRrFHhuBoHZU",
        authDomain: "usdt-8b129.firebaseapp.com",
        projectId: "usdt-8b129",
        storageBucket: "usdt-8b129.firebasestorage.app",
        messagingSenderId: "816855613636",
        appId: "1:816855613636:web:7891ba3996acef2c91c991"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const userId = tg.initDataUnsafe?.user?.id?.toString();
    const userName = tg.initDataUnsafe?.user?.first_name || "Usuario";

    let clicks = 0;
    let multiplier = 1;
    let doubleCount = 0;
    let lastReset = 0;
    let balance = 0;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    function playCoin() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
    }

    function updateUI() {
        document.getElementById('progressFill').style.width = (clicks / 10) * 100 + '%';
        document.getElementById('clicksText').innerText = clicks + ' / 10 clicks';
        document.getElementById('info').innerHTML = `Multiplicador: ${multiplier}x | Veces: ${doubleCount}/5`;
        document.getElementById('user-balance').innerText = balance.toFixed(6);
        
        const btn = document.getElementById('doubleBtn');
        if (clicks >= 10) {
            btn.classList.remove('disabled');
        } else {
            btn.classList.add('disabled');
        }
    }

    function updateTimer() {
        const now = Date.now();
        if (lastReset === 0) return;
        const diff = (now - lastReset) / (1000 * 60);
        const remaining = Math.max(0, 50 - diff);
        const minutes = Math.floor(remaining);
        const seconds = Math.floor((remaining - minutes) * 60);
        document.getElementById('timer').innerHTML = `Reinicio en ${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        
        if (remaining <= 0) {
            clicks = 0;
            multiplier = 1;
            doubleCount = 0;
            lastReset = now;
            updateUI();
            saveGame();
            showToast("Nuevo ciclo. 10 clicks = 0.0001 USDT");
        }
    }

    async function loadData() {
        if (!userId) return;
        const doc = await db.collection("usuarios").doc(userId).get();
        if (!doc.exists) {
            await db.collection("usuarios").doc(userId).set({
                nombre: userName,
                balance: 0,
                comision: 0,
                referidos: 0,
                clicks: 0,
                multiplier: 1,
                doubleCount: 0,
                lastReset: Date.now()
            });
        }
        const data = doc.data();
        balance = data.balance || 0;
        clicks = data.clicks || 0;
        multiplier = data.multiplier || 1;
        doubleCount = data.doubleCount || 0;
        lastReset = data.lastReset || Date.now();
        updateUI();
        setInterval(updateTimer, 1000);
    }

    async function saveGame() {
        if (!userId) return;
        await db.collection("usuarios").doc(userId).update({
            clicks: clicks,
            multiplier: multiplier,
            doubleCount: doubleCount,
            lastReset: lastReset,
            balance: balance
        });
    }

    async function handleClick() {
        if (clicks >= 10) {
            showToast("Ya tienes 10 clicks. Usa DOBLAR");
            return;
        }
        clicks++;
        playCoin();
        const chest = document.getElementById('chest');
        gsap.to(chest, { scale: 0.95, duration: 0.05, yoyo: true, repeat: 1 });
        updateUI();
        if (clicks === 10) {
            showToast("10 clicks completados. Usa DOBLAR");
            canvasConfetti({ particleCount: 100, spread: 50 });
        }
        await saveGame();
    }

    async function handleDouble() {
        if (clicks < 10) {
            showToast("Necesitas 10 clicks primero");
            return;
        }
        
        if (doubleCount >= 5) {
            const reward = 0.0001 * multiplier;
            balance += reward;
            playCoin();
            canvasConfetti({ particleCount: 200, spread: 70 });
            showToast(`+${reward.toFixed(6)} USDT (x${multiplier})`);
            clicks = 0;
            multiplier = 1;
            doubleCount = 0;
            lastReset = Date.now();
            updateUI();
            await saveGame();
            return;
        }
        
        showToast("Anuncio en reproducción...");
        
        setTimeout(async () => {
            doubleCount++;
            multiplier = Math.pow(2, doubleCount);
            updateUI();
            await saveGame();
            showToast(`Multiplicador x${multiplier} | Te quedan ${5 - doubleCount} dobles`);
            if (doubleCount === 5) {
                showToast("Máximo multiplicador. Usa DOBLAR para reclamar");
                canvasConfetti({ particleCount: 300, spread: 80 });
            }
        }, 1500);
    }

    document.getElementById('chest').onclick = handleClick;
    document.getElementById('doubleBtn').onclick = handleDouble;
    
    loadData();
</script>
</body>
</html>
