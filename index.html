<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoQuest Staking</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --dark-core: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at top, #1a1a2e 0%, var(--dark-core) 100%);
            color: white; margin: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app-shell { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 20px; box-sizing: border-box; }

        /* Header Estilo Game */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; color: var(--neon-blue); }
        .server-status { font-size: 10px; text-transform: uppercase; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 2px 8px; border-radius: 4px; }

        /* Tarjeta Principal */
        .main-display {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.1), rgba(0, 242, 255, 0.1));
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 30px 20px; text-align: center; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 25px;
        }

        .label { color: var(--neon-blue); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        .balance-container { margin: 15px 0; }
        .balance { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 700; text-shadow: 0 0 20px var(--neon-blue); }
        .currency { font-size: 1rem; color: var(--neon-blue); margin-left: 5px; }

        /* Barra de Progreso */
        .progress-box { margin-top: 20px; }
        .bar-bg { background: rgba(0,0,0,0.5); height: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; position: relative; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue)); box-shadow: 0 0 15px var(--neon-blue); transition: width 0.3s ease; }

        /* Botones de Acción */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 18px; color: white; font-family: 'Orbitron';
            font-size: 0.8rem; cursor: pointer; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
        }
        .game-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .btn-withdraw { border-color: var(--neon-purple); color: var(--neon-purple); }
        .btn-withdraw.ready { background: var(--neon-purple); color: white; box-shadow: 0 0 20px var(--neon-purple); }

        .btn-stake {
            grid-column: span 2; margin-top: 10px; background: linear-gradient(90deg, #12c2e9, #c471ed, #f64f59);
            border: none; font-weight: 700; height: 60px; border-radius: 20px; font-size: 1rem;
        }

        /* Espacio de Publicidad */
        .ad-container { 
            width: 100%; min-height: 60px; background: var(--glass); 
            border: 1px dashed rgba(255,255,255,0.1); margin: 25px 0;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
        }

        /* Notificaciones */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: #000; padding: 12px 25px;
            border-radius: 50px; font-weight: 700; font-size: 14px; display: none; z-index: 1000;
        }

        /* Navegación */
        .nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,7,10,0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--neon-blue); }
    </style>
</head>
<body>

<div id="toast">MENSAJE</div>

<div class="app-shell">
    <div class="top-bar">
        <div class="logo">CRYPTO<span style="color:var(--neon-purple)">QUEST</span></div>
        <div class="server-status">NODE_01 ACTIVE</div>
    </div>

    <div class="ad-container">ADSGRAM_PLACEHOLDER_TOP</div>

    <div class="main-display">
        <div class="label">Balance de Ganancias</div>
        <div class="balance-container">
            <span class="balance" id="display-balance">0.0000</span>
            <span class="currency">USDT</span>
        </div>
        
        <div class="progress-box">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px">
                <span id="cycle-text">MINERÍA INACTIVA</span>
                <span id="perc-text">0%</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" id="progress-bar"></div>
            </div>
        </div>
        
        <div style="margin-top:15px; font-size:12px; color:rgba(255,255,255,0.5)">
            Siguiente pago estimado: <span id="est-payout" style="color:var(--neon-green)">0.0000</span> USDT
        </div>
    </div>

    <div class="action-grid">
        <button class="game-btn" onclick="notify('Mínimo de depósito: 10 USDT')">DEPOSITAR</button>
        <button class="game-btn btn-withdraw" id="btn-withdraw" onclick="handleWithdraw()">RETIRAR</button>
        <button class="game-btn btn-stake" id="btn-main-action" onclick="toggleStaking()">ACTIVAR PROTOCOLO STAKING ($2.00)</button>
    </div>

    <div class="ad-container">MONETAG_PLACEHOLDER_BOTTOM</div>
</div>

<nav class="nav">
    <a href="#" class="nav-item active">DASHBOARD</a>
    <a href="#" class="nav-item" onclick="notify('Sección disponible en Nivel 2')">REFERIDOS</a>
    <a href="#" class="nav-item" onclick="notify('Mercado en mantenimiento')">MERCADO</a>
    <a href="#" class="nav-item" onclick="notify('ID: USER_99283')">PERFIL</a>
</nav>

<script>
    // Variables de Estado
    let userData = {
        balance: 0.0000,
        stakingActive: false,
        lastPayout: 0.012,
        progress: 0
    };

    // Cargar datos al iniciar
    window.onload = function() {
        const saved = localStorage.getItem('quest_user_data');
        if(saved) {
            userData = JSON.parse(saved);
            updateUI();
            if(userData.stakingActive) resumeStaking();
        }
        generateEstimated();
    };

    function save() {
        localStorage.setItem('quest_user_data', JSON.stringify(userData));
    }

    function notify(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    function generateEstimated() {
        // Genera valores entre 0.008 y 0.02
        const val = (Math.random() * (0.020 - 0.008) + 0.008).toFixed(4);
        document.getElementById('est-payout').innerText = val;
        return parseFloat(val);
    }

    function updateUI() {
        document.getElementById('display-balance').innerText = userData.balance.toFixed(4);
        const wBtn = document.getElementById('btn-withdraw');
        
        if(userData.balance >= 0.02) {
            wBtn.classList.add('ready');
        } else {
            wBtn.classList.remove('ready');
        }
    }

    function toggleStaking() {
        if(userData.stakingActive) {
            notify("Protocolo ya está en ejecución");
            return;
        }
        userData.stakingActive = true;
        document.getElementById('btn-main-action').innerText = "STAKING ACTIVO";
        document.getElementById('btn-main-action').style.opacity = "0.5";
        resumeStaking();
        notify("Bono de $2 activado con éxito");
    }

    function resumeStaking() {
        document.getElementById('cycle-text').innerText = "PROCESANDO BLOQUES...";
        document.getElementById('btn-main-action').innerText = "STAKING ACTIVO";
        document.getElementById('btn-main-action').style.opacity = "0.5";
        
        const loop = setInterval(() => {
            userData.progress += 2; // Velocidad de prueba, ajustar si se quiere más lento
            document.getElementById('progress-bar').style.width = userData.progress + "%";
            document.getElementById('perc-text').innerText = userData.progress + "%";

            if(userData.progress >= 100) {
                const payout = generateEstimated();
                userData.balance += payout;
                userData.progress = 0;
                updateUI();
                save();
                notify("¡Ciclo completado: +" + payout + " USDT!");
            }
            save();
        }, 1000);
    }

    function handleWithdraw() {
        if(userData.balance < 0.02) {
            notify("Mínimo de retiro: 0.02 USDT");
        } else {
            notify("Solicitud de retiro enviada: " + userData.balance.toFixed(4) + " USDT");
            userData.balance = 0;
            updateUI();
            save();
        }
    }
</script>

</body>
</html>
