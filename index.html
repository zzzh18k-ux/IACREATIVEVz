<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff007a; --neon-cyan: #00f2ff; --gold: #ffcc00;
            --deep-dark: #05080f; --glass: rgba(255, 255, 255, 0.03);
            --grad-prime: linear-gradient(135deg, #ff007a 0%, #7000ff 100%);
            --grad-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body {
            font-family: 'Outfit', sans-serif; background-color: var(--deep-dark);
            color: #ffffff; margin: 0; padding: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(255, 0, 122, 0.08), transparent 40%);
            min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 25px; padding-bottom: 120px; }
        .balance-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4));
            border-radius: 40px; padding: 40px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }
        .main-amount { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; display: inline-block; }
        .prime-btn { background: var(--grad-prime); border: none; width: 100%; padding: 22px; border-radius: 25px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .lvl2-btn { background: #111; color: #444; border: 1px solid #222; width: 100%; padding: 18px; border-radius: 20px; font-weight: 800; margin-top: 15px; cursor: not-allowed; transition: 0.3s; }
        .lvl2-btn.active { background: var(--grad-gold); color: #000; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(170, 119, 28, 0.3); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 30px; backdrop-filter: blur(15px); }
        .modal-card { background: #0a0e17; border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; padding: 40px 25px; text-align: center; width: 100%; }
        .status-box { background: rgba(0,242,255,0.05); border-left: 3px solid var(--neon-cyan); padding: 15px; border-radius: 15px; margin-top: 20px; display: none; font-size: 13px; animation: slideUp 0.3s ease; }
        .lang-dot { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 12px; font-size: 10px; cursor: pointer; color: #666; font-weight: 800; }
        .lang-dot.active { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0, 242, 255, 0.1); }
        .history-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        #video-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div style="font-weight:800; font-size:22px; letter-spacing:-1px;">CANDY CLOUD</div>
        <div style="display:flex; gap:8px;">
            <div class="lang-dot active" id="btn-es" onclick="setLang('es')">ES</div>
            <div class="lang-dot" id="btn-en" onclick="setLang('en')">EN</div>
        </div>
    </div>

    <div id="v-home">
        <div class="balance-card">
            <div style="font-size: 11px; color: #555; text-transform: uppercase;" data-t="bal_label">Balance Neto</div>
            <div class="main-amount">$<span id="val-balance">0.0000</span></div>
            <div style="margin-top:15px; font-size:13px; background:rgba(255,255,255,0.03); padding:8px 15px; border-radius:50px; display:inline-block;">
                🍬 <span data-t="candies">Caramelos</span>: <b id="val-candy" style="color:var(--accent)">0</b>
            </div>
        </div>

        <div id="status-msg" class="status-box"></div>

        <button class="prime-btn" onclick="startTask()" data-t="btn_task">Ejecutar Tarea Diaria</button>

        <button class="prime-btn" style="background:none; border:1px solid #1a1a1a; color:#fff;" onclick="withdraw()" data-t="btn_withdraw">Retirar (0.02 USDT)</button>
        
        <div id="hist-section" style="margin-top:30px; display:none;">
            <div style="font-size:10px; color:#444; font-weight:800; text-transform:uppercase; margin-bottom:10px;" data-t="hist_t">Historial de Retiros</div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="v-earn" style="display:none;">
        <h2 style="font-weight:800;" data-t="earn_t">Misiones</h2>
        <div style="background:var(--glass); padding:20px; border-radius:25px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.03);">
            <div><b>Canal Oficial</b><br><small style="color:var(--gold)">+1 Caramelo</small></div>
            <button class="prime-btn" id="btn-c1" style="width:auto; padding:12px 20px; margin:0;" onclick="join(1)" data-t="join">UNIRSE</button>
        </div>
    </div>
</div>

<nav style="position:fixed; bottom:0; left:0; width:100%; background:rgba(5,8,15,0.98); display:flex; justify-content:space-around; padding:20px; border-top:1px solid #111; z-index:100;">
    <button onclick="view('home')" style="background:none; border:none; color:#fff; font-weight:800;" data-t="nav_h">INICIO</button>
    <button onclick="view('earn')" style="background:none; border:none; color:#666; font-weight:800;" data-t="nav_e">GANA</button>
</nav>

<script>
    const TG_TOKEN = "8746370321:AAHLrn8OHEPNqyOIqY75Q4ocBVOgsZ8GI34";
    const CHISMOSO_ID = "@ALSKSNNSLSMS"; 

    // BONO DE PRUEBA: Iniciamos con 0.0400 para que retires dos veces
    let db = { lang: 'es', balance: 0.0400, candies: 0, ch1: false, last: '', level: 1, total: 0, hist: [], refBy: null };

    const i18n = {
        es: {
            bal_label: "Balance Neto", candies: "Caramelos", btn_task: "Ejecutar Tarea Diaria",
            btn_withdraw: "Retirar (0.02 USDT)", earn_t: "Misiones Candy", join: "UNIRSE",
            nav_h: "INICIO", nav_e: "GANA", hist_t: "Historial de Retiros", w_err: "SALDO INSUFICIENTE", w_ok: "RETIRO EXITOSO"
        },
        en: {
            bal_label: "Net Balance", candies: "Candies", btn_task: "Run Daily Task",
            btn_withdraw: "Withdraw (0.02 USDT)", earn_t: "Candy Missions", join: "JOIN",
            nav_h: "HOME", nav_e: "EARN", hist_t: "Withdrawal History", w_err: "INSUFFICIENT BALANCE", w_ok: "SUCCESSFUL WITHDRAWAL"
        }
    };

    function save() { localStorage.setItem('_candy_v2', JSON.stringify(db)); }
    
    function setLang(l) {
        db.lang = l;
        const s = i18n[l];
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            if(s[key]) el.innerText = s[key];
        });
        document.getElementById('btn-es').classList.toggle('active', l === 'es');
        document.getElementById('btn-en').classList.toggle('active', l === 'en');
        save();
    }

    function checkReferral() {
        const urlParams = new URLSearchParams(window.location.search);
        const refId = urlParams.get('start');
        if (refId && !db.refBy) {
            db.refBy = refId;
            save();
            const msg = `👤 **NUEVO INVITADO**\n\n📥 Un usuario entró a la App\n👤 Invitado por: \`${refId}\``;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHISMOSO_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }
    }

    function load() { 
        const d = localStorage.getItem('_candy_v2'); 
        if(d) db = JSON.parse(d); 
        update(); 
        checkReferral();
        setLang(db.lang);
    }

    function update() {
        document.getElementById('val-balance').innerText = db.balance.toFixed(4);
        document.getElementById('val-candy').innerText = db.candies;
        if(db.hist.length > 0) {
            document.getElementById('hist-section').style.display = 'block';
            document.getElementById('history-list').innerHTML = db.hist.map(h => `
                <div class="history-card">
                    <div><b>${h.amt} USDT</b><br><small>${h.date}</small></div>
                    <div style="color:#00ff88; font-weight:800;">EXITOSO</div>
                </div>
            `).join('');
        }
    }

    function withdraw() {
        if(db.balance < 0.02) return showStatus(i18n[db.lang].w_err, true);
        const amount = 0.02;
        const msg = `🚨 *NUEVO RETIRO PENDIENTE*\n\n💰 Monto: ${amount} USDT\n⚠️ Usuario probando chismoso.`;
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHISMOSO_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        db.hist.unshift({ amt: amount, date: new Date().toLocaleDateString() });
        db.balance -= 0.02; 
        save(); update(); showStatus(i18n[db.lang].w_ok);
    }

    function showStatus(txt, err=false) { const b = document.getElementById('status-msg'); b.innerText = txt; b.style.display = 'block'; setTimeout(() => b.style.display='none', 4000); }
    function view(v) { document.getElementById('v-home').style.display = (v === 'home' ? 'block' : 'none'); document.getElementById('v-earn').style.display = (v === 'earn' ? 'block' : 'none'); }
    
    window.onload = load;
</script>
</body>
</html>
