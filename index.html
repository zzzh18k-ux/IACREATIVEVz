<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff007a; --neon-cyan: #00f2ff; --gold: #ffcc00;
            --deep-dark: #05080f; --glass: rgba(255, 255, 255, 0.03);
            --grad-prime: linear-gradient(135deg, #ff007a 0%, #7000ff 100%);
            --grad-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body {
            font-family: 'Outfit', sans-serif; background-color: var(--deep-dark);
            color: #ffffff; margin: 0; padding: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(255, 0, 122, 0.08), transparent 40%);
            min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 25px; padding-bottom: 120px; }
        .icon-svg { width: 22px; height: 22px; fill: currentColor; vertical-align: middle; }
        .header-ui { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .logo-text { font-weight: 800; font-size: 22px; letter-spacing: -1px; color: #fff; }
        .lang-grid { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; max-width: 200px; }
        .lang-dot { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 5px 10px; border-radius: 10px; font-size: 9px; cursor: pointer; color: #666; font-weight: 700;
        }
        .lang-dot.active { border-color: var(--neon-cyan); color: var(--neon-cyan); background: rgba(0, 242, 255, 0.05); }
        .balance-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4));
            border-radius: 40px; padding: 40px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }
        .symbol { font-size: 2rem; color: var(--neon-cyan); margin-right: 8px; font-weight: 300; vertical-align: middle; }
        .main-amount { font-size: 3.5rem; font-weight: 800; letter-spacing: -4px; display: inline-block; vertical-align: middle; }
        .candy-status {
            margin-top: 15px; background: rgba(255,255,255,0.03); padding: 8px 18px; border-radius: 50px; 
            font-size: 12px; border: 1px solid rgba(255,255,255,0.08); display: inline-flex; align-items: center; gap: 10px;
        }
        .next-info {
            margin-top: 20px; background: rgba(0, 242, 255, 0.03); border: 1px dashed rgba(0, 242, 255, 0.2);
            padding: 12px; border-radius: 20px; text-align: center;
        }
        .prime-btn {
            background: var(--grad-prime); border: none; width: 100%; padding: 22px; border-radius: 25px;
            color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 35px rgba(255, 0, 122, 0.2); margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .upgrade-section { background: rgba(255,255,255,0.02); border-radius: 30px; padding: 25px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.04); }
        .lvl2-btn { background: #111; color: #444; border: 1px solid #222; width: 100%; padding: 18px; border-radius: 20px; font-weight: 800; margin-top: 15px; cursor: not-allowed; }
        .lvl2-btn.active { background: var(--grad-gold); color: #000; border: none; cursor: pointer; }
        .wallet-box { margin-top: 25px; background: var(--glass); padding: 22px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .wallet-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid #222; padding: 15px; border-radius: 15px; color: var(--neon-cyan); font-family: monospace; font-size: 13px; margin-top: 10px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 30px; }
        .modal-card { background: #0a0e17; border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; padding: 45px 25px; text-align: center; width: 100%; max-width: 350px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5,8,15,0.98); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { background: none; border: none; color: #3d3d3d; cursor: pointer; font-size: 11px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        #video-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>
<div class="modal-overlay" id="modal">
    <div class="modal-card">
        <div id="m-icon" style="font-size: 50px; margin-bottom: 20px;"></div>
        <h2 id="m-title" style="margin: 0; font-weight: 800;"></h2>
        <p id="m-body" style="color: #666; margin: 15px 0 30px 0; font-size: 15px;"></p>
        <button class="prime-btn" onclick="closeM()" style="margin:0; padding: 18px;">OK</button>
    </div>
</div>

<div class="app-container">
    <div class="header-ui">
        <div class="logo-text">CANDY CLOUD</div>
        <div class="lang-grid">
            <div class="lang-dot active" onclick="setLang('es')">ES</div>
            <div class="lang-dot" onclick="setLang('en')">EN</div>
        </div>
    </div>

    <div id="v-home">
        <div class="balance-card">
            <div style="font-size: 10px; color: #555; text-transform: uppercase;" id="t-bal-label">Balance Neto</div>
            <div class="main-amount"><span class="symbol">$</span><span id="val-balance">0.0000</span></div>
            
            <div class="next-info">
                <div style="font-size: 9px; color: #555; font-weight: 800; text-transform: uppercase;">Próxima Tarea:</div>
                <div style="color: var(--neon-cyan); font-weight: 800; font-size: 18px;" id="val-next">0.0100 USDT</div>
            </div>

            <div class="candy-status">
                <span id="t-candies">Caramelos</span>: <b id="val-candy" style="color:var(--accent)">0</b>
            </div>
        </div>

        <div class="wallet-box">
            <div style="font-size: 10px; color: #444; font-weight: 700;" id="t-wallet-label">USDT WALLET (POLYGON)</div>
            <input type="text" id="wallet-addr" placeholder="0x..." class="wallet-input" onchange="saveW()">
        </div>

        <button class="prime-btn" onclick="startTask()">
            <span id="t-btn-task">Ejecutar Tarea Diaria</span>
        </button>

        <div class="upgrade-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><b style="font-size:15px;" id="t-lvl2-name">Nivel Premium</b><br><span style="font-size:11px; color:#555;">Gana 0.10 USDT fijos</span></div>
                <div style="color:var(--gold); font-weight:800;">$2.50</div>
            </div>
            <button class="lvl2-btn" id="btn-upgrade" onclick="buyLevel2()">Locked</button>
        </div>

        <button class="prime-btn" id="btn-withdraw" style="background:none; border: 1px solid #1a1a1a; color:#333;" onclick="withdraw()">
            <span id="t-btn-withdraw">Retirar (0.02)</span>
        </button>
    </div>

    <div id="v-earn" style="display:none;">
        <h2 id="t-earn-title">Recompensas</h2>
        <p id="t-earn-desc" style="color:#555; font-size:14px;">Une tu perfil a los canales oficiales.</p>
        <div style="background:var(--glass); padding:20px; border-radius:20px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <b>Canal 1 (+1🍬)</b>
            <button class="prime-btn" style="width:auto; padding:10px 20px; margin:0;" onclick="join(1)">JOIN</button>
        </div>
        <div style="background:var(--glass); padding:20px; border-radius:20px; display:flex; justify-content:space-between; align-items:center;">
            <b>Canal 2 (+1🍬)</b>
            <button class="prime-btn" style="width:auto; padding:10px 20px; margin:0;" onclick="join(2)">JOIN</button>
        </div>
    </div>
</div>

<div id="video-overlay">
    <div id="timer" style="font-size:80px; font-weight:800;">10</div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="view('home')">Home</button>
    <button class="nav-item" onclick="view('earn')">Earn</button>
</nav>
<script>
    let db = { lang: 'es', balance: 0.0000, candies: 0, wallet: '', ch1: false, ch2: false, last: '', level: 1, total: 0 };
    const i18n = {
        es: { bal: "Balance Neto", candies: "Caramelos", b_task: "Ejecutar Tarea", b_withdraw: "Retirar (0.02)", m_candy: "Necesitas 2 caramelos.", m_wallet: "Configura tu wallet.", m_today: "Vuelve mañana.", m_win: "Ganaste " },
        en: { bal: "Balance", candies: "Candies", b_task: "Daily Task", b_withdraw: "Withdraw (0.02)", m_candy: "Need 2 candies.", m_wallet: "Set wallet.", m_today: "Come back tomorrow.", m_win: "You won " }
    };

    function save() { localStorage.setItem('_candy_cloud_db', JSON.stringify(db)); }
    function load() { const d = localStorage.getItem('_candy_cloud_db'); if(d) db = JSON.parse(d); update(); }
    function pop(t, m, i) { document.getElementById('m-title').innerText = t; document.getElementById('m-body').innerText = m; document.getElementById('m-icon').innerText = i; document.getElementById('modal').style.display = 'flex'; }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function update() {
        const s = i18n[db.lang];
        document.getElementById('val-balance').innerText = db.balance.toFixed(4);
        document.getElementById('val-candy').innerText = db.candies;
        document.getElementById('wallet-addr').value = db.wallet;
        
        // Lógica de "Próximo Pago" que usted pidió
        let next = 0.0100;
        if(db.level === 2) next = 0.1000;
        else {
            if(db.total === 1) next = 0.0020;
            else if(db.total === 2) next = 0.0100;
            else if(db.total === 3) next = 0.0080;
            else if(db.total >= 4) next = 0.0010;
        }
        document.getElementById('val-next').innerText = next.toFixed(4) + " USDT";

        const ub = document.getElementById('btn-upgrade');
        if(db.level === 2) { ub.innerText = "ACTIVE"; ub.classList.add('active'); }
        else if(db.balance >= 2.5) ub.classList.add('active');
    }

    function startTask() {
        const s = i18n[db.lang];
        if(db.candies < 2) return pop("!", s.m_candy, "🔒");
        if(db.wallet.length < 10) return pop("!", s.m_wallet, "💳");
        if(db.last === new Date().toDateString()) return pop("!", s.m_today, "📅");
        
        document.getElementById('video-overlay').style.display = 'flex';
        let c = 10;
        const t = setInterval(() => { 
            c--; document.getElementById('timer').innerText = c;
            if(c<=0) { clearInterval(t); document.getElementById('video-overlay').style.display='none'; finish(); }
        }, 1000);
    }

    function finish() {
        let win = 0;
        if(db.level === 2) {
            win = 0.1000; // Pago Premium fijo
        } else {
            // Lógica exacta de días que usted pidió
            if(db.total === 0) win = 0.0100;
            else if(db.total === 1) win = 0.0020;
            else if(db.total === 2) win = 0.0100;
            else if(db.total === 3) win = 0.0080;
            else win = 0.0010; 
        }
        db.balance += win; db.total++; db.last = new Date().toDateString();
        save(); update(); pop("OK", i18n[db.lang].m_win + win.toFixed(4), "⚡");
    }

    function buyLevel2() { if(db.level === 2 || db.balance < 2.5) return; db.balance -= 2.5; db.level = 2; save(); update(); }
    function withdraw() { if(db.balance < 0.02) return pop("!", "Min 0.02", "⚠️"); db.balance = 0; save(); update(); pop("OK", "Processing...", "📤"); }
    function view(v) { document.getElementById('v-home').style.display = (v === 'home' ? 'block' : 'none'); document.getElementById('v-earn').style.display = (v === 'earn' ? 'block' : 'none'); }
    function join(n) { if(n === 1 && !db.ch1) { db.ch1 = true; db.candies++; } if(n === 2 && !db.ch2) { db.ch2 = true; db.candies++; } save(); update(); window.open('https://t.me/TuCanal'); }
    function saveW() { db.wallet = document.getElementById('wallet-addr').value; save(); }
    window.onload = load;
</script>
</body>
</html>
