<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff007a; --neon-cyan: #00f2ff; --gold: #ffcc00;
            --deep-dark: #05080f; --glass: rgba(255, 255, 255, 0.03);
            --grad-prime: linear-gradient(135deg, #ff007a 0%, #7000ff 100%);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif; background-color: var(--deep-dark);
            color: #ffffff; margin: 0; padding: 0; min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 25px; padding-bottom: 120px; }
        .balance-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4));
            border-radius: 40px; padding: 30px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.06);
        }
        .main-amount { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; color: white; }
        .next-reward-box {
            margin: 20px 0; padding: 15px; border-radius: 20px; background: rgba(0,242,255,0.03);
            border: 1px dashed rgba(0,242,255,0.2);
        }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 30px; }
        .modal-card { background: #0a0e17; border-radius: 35px; padding: 40px 25px; text-align: center; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        .schedule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .day-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); }
        .prime-btn {
            background: var(--grad-prime); border: none; width: 100%; padding: 20px; border-radius: 25px;
            color: white; font-size: 16px; font-weight: 700; margin-top: 20px; box-shadow: 0 10px 25px rgba(255, 0, 122, 0.3);
        }
        .lang-dot { padding: 5px 10px; border-radius: 10px; font-size: 10px; cursor: pointer; background: var(--glass); color: #555; border: 1px solid rgba(255,255,255,0.1); }
        .lang-dot.active { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .verify-badge { color: #00ff88; font-weight: 800; display: none; }
        .btn-verify.done { background: #00ff8822; color: #00ff88; border: 1px solid #00ff8844; box-shadow: none; }
    </style>
</head>
<body>
<div class="modal-overlay" id="modal">
    <div class="modal-card">
        <div id="m-icon" style="font-size: 60px; margin-bottom: 10px;">📅</div>
        <h2 id="m-title" style="margin:0">Vuelve mañana</h2>
        <p id="m-body" style="color: #666; font-size: 14px; margin-top: 10px;"></p>
        <div class="schedule-grid" id="m-schedule">
            <div class="day-box">Día 1: <b>0.010$</b></div>
            <div class="day-box">Día 2: <b>0.002$</b></div>
            <div class="day-box">Día 3: <b>0.010$</b></div>
            <div class="day-box">Día 4: <b>0.008$</b></div>
        </div>
        <button class="prime-btn" onclick="closeM()">OK</button>
    </div>
</div>
<div class="app-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div style="font-weight:800; font-size:20px;">CANDY CLOUD</div>
        <div style="display:flex; gap:5px;" id="lang-switcher">
            <div class="lang-dot active" onclick="setLang('es')">ES</div>
            <div class="lang-dot" onclick="setLang('en')">EN</div>
            <div class="lang-dot" onclick="setLang('pt')">PT</div>
        </div>
    </div>

    <div id="v-home">
        <div class="balance-card">
            <div style="font-size: 11px; color: #555; text-transform: uppercase;" id="t-bal-label">Balance Neto</div>
            <div class="main-amount">$<span id="val-balance">0.0000</span></div>
            <div class="next-reward-box">
                <div style="font-size: 9px; color: #555; margin-bottom: 5px;" id="t-next-label">PRÓXIMO PAGO</div>
                <div style="color: var(--neon-cyan); font-weight: 800; font-size: 18px;" id="val-next">0.0100 USDT</div>
            </div>
            <div style="font-size: 13px;">🍬 <span id="t-candies">Caramelos</span>: <b id="val-candy" style="color:var(--accent)">0</b></div>
        </div>

        <button class="prime-btn" onclick="startTask()" id="t-btn-task">Ejecutar Tarea Diaria</button>
        
        <button class="prime-btn" style="background:none; border:1px solid #222; color:#444;" onclick="withdraw()" id="t-btn-withdraw">Retirar (0.02)</button>
    </div>

    <div id="v-earn" style="display:none;">
        <h2 id="t-earn-title">Bono de Caramelos</h2>
        <div style="background:var(--glass); padding:20px; border-radius:25px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <div><b>Canal Oficial</b><br><small style="color:var(--gold)">+1🍬 ($1.00)</small></div>
            <button class="prime-btn" id="btn-c1" style="width:auto; padding:10px 20px; margin:0;" onclick="join(1)">UNIRSE</button>
        </div>
        <div style="background:var(--glass); padding:20px; border-radius:25px; display:flex; justify-content:space-between; align-items:center;">
            <div><b>Grupo VIP</b><br><small style="color:var(--gold)">+1🍬 ($1.00)</small></div>
            <button class="prime-btn" id="btn-c2" style="width:auto; padding:10px 20px; margin:0;" onclick="join(2)">UNIRSE</button>
        </div>
    </div>
</div>

<nav style="position:fixed; bottom:0; width:100%; background:rgba(5,8,15,0.9); display:flex; justify-content:space-around; padding:20px; border-top:1px solid #111;">
    <button onclick="view('home')" style="background:none; border:none; color:white; font-weight:700;">Home</button>
    <button onclick="view('earn')" style="background:none; border:none; color:white; font-weight:700;">Earn</button>
</nav>
<script>
    let db = { lang: 'es', balance: 0.0000, candies: 0, ch1: false, ch2: false, last: '', total: 0 };
    const i18n = {
        es: { bal: "Balance Neto", next: "PRÓXIMO PAGO", btn: "Ejecutar Tarea", earn: "Bono de Caramelos", m_today: "Vuelve mañana para continuar tu racha.", join: "UNIRSE", done: "✓ VERIFICADO" },
        en: { bal: "Net Balance", next: "NEXT PAYOUT", btn: "Run Daily Task", earn: "Candy Bonus", m_today: "Come back tomorrow to continue your streak.", join: "JOIN", done: "✓ VERIFIED" },
        pt: { bal: "Saldo Líquido", next: "PRÓXIMO PAGAMENTO", btn: "Executar Tarefa", earn: "Bônus de Doces", m_today: "Volte amanhã para continuar sua seqüência.", join: "ENTRAR", done: "✓ VERIFICADO" }
    };

    function save() { localStorage.setItem('_candy_pro_v3', JSON.stringify(db)); }
    function load() { const d = localStorage.getItem('_candy_pro_v3'); if(d) db = JSON.parse(d); update(); }

    function update() {
        const s = i18n[db.lang];
        document.getElementById('val-balance').innerText = db.balance.toFixed(4);
        document.getElementById('val-candy').innerText = db.candies;
        document.getElementById('t-bal-label').innerText = s.bal;
        document.getElementById('t-next-label').innerText = s.next;
        document.getElementById('t-btn-task').innerText = s.btn;
        document.getElementById('t-earn-title').innerText = s.earn;

        // Mostrar próximo pago en pantalla principal
        let nxt = 0.0100;
        if(db.total === 1) nxt = 0.0020;
        else if(db.total === 2) nxt = 0.0100;
        else if(db.total === 3) nxt = 0.0080;
        else if(db.total >= 4) nxt = 0.0010;
        document.getElementById('val-next').innerText = nxt.toFixed(4) + " USDT";

        // Botones verificados en verde
        if(db.ch1) { const b1 = document.getElementById('btn-c1'); b1.innerText = s.done; b1.classList.add('done'); b1.onclick = null; }
        if(db.ch2) { const b2 = document.getElementById('btn-c2'); b2.innerText = s.done; b2.classList.add('done'); b2.onclick = null; }
    }

    function startTask() {
        if(db.last === new Date().toDateString()) {
            document.getElementById('m-body').innerText = i18n[db.lang].m_today;
            document.getElementById('modal').style.display = 'flex';
            return;
        }
        // Lógica de pago según su plan
        let win = 0;
        if(db.total === 0) win = 0.01;
        else if(db.total === 1) win = 0.002;
        else if(db.total === 2) win = 0.01;
        else if(db.total === 3) win = 0.008;
        else win = 0.001;

        db.balance += win; db.total++; db.last = new Date().toDateString();
        save(); update(); alert("¡Ganaste " + win + " USDT!");
    }

    function join(n) {
        window.open('https://t.me/TuCanal'); 
        if(n === 1) db.ch1 = true; else db.ch2 = true;
        db.candies++; db.balance += 1.0; // 1 caramelo = 1$ como pidió
        save(); update();
    }

    function setLang(l) { db.lang = l; save(); update(); }
    function view(v) { document.getElementById('v-home').style.display = (v === 'home' ? 'block' : 'none'); document.getElementById('v-earn').style.display = (v === 'earn' ? 'block' : 'none'); }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    window.onload = load;
</script>
</body>
</html>
