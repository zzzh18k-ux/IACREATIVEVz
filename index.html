<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Cloud Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    
    <script src='//libtl.com/sdk.js' data-zone='10763886' data-sdk='show_10763886'></script>

    <style>
        :root {
            --accent: #ff007a; --neon-cyan: #00f2ff; --gold: #ffcc00;
            --deep-dark: #05080f; --glass: rgba(255, 255, 255, 0.03);
            --grad-prime: linear-gradient(135deg, #ff007a 0%, #7000ff 100%);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body {
            font-family: 'Outfit', sans-serif; background-color: var(--deep-dark);
            color: #ffffff; margin: 0; padding: 0; overflow: hidden; height: 100vh;
            background-image: radial-gradient(circle at top left, rgba(255, 0, 122, 0.12), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(0, 242, 255, 0.08), transparent 40%);
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 25px; height: 100vh; overflow-y: auto; padding-bottom: 120px; position: relative; }
        
        .brand-header { display: flex; flex-direction: column; margin-bottom: 35px; }
        .brand-top { display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; gap: 8px; }
        .big-candy { font-size: 24px; filter: drop-shadow(0 0 8px var(--accent)); }
        .value-badge { font-size: 10px; font-weight: 800; color: var(--gold); background: rgba(255, 204, 0, 0.1); padding: 2px 8px; border-radius: 6px; margin-top: 5px; align-self: flex-start; border: 1px solid rgba(255, 204, 0, 0.2); }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(10, 14, 23, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 25px; border-radius: 15px;
            z-index: 11000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .balance-card {
            background: linear-gradient(160deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.4) 100%);
            border-radius: 35px; padding: 45px 20px; text-align: center; 
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); margin-bottom: 30px;
        }
        .main-amount { font-size: 3.8rem; font-weight: 800; letter-spacing: -3px; }

        .prime-btn { background: var(--grad-prime); border: none; width: 100%; padding: 22px; border-radius: 20px; color: white; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .prime-btn:active { transform: scale(0.97); }
        .prime-btn.done { background: rgba(255,255,255,0.05); color: #444; border: 1px solid rgba(255,255,255,0.05); cursor: default; }

        .lang-pill { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; display: flex; gap: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .l-btn { border: none; background: none; color: #555; font-weight: 800; font-size: 11px; padding: 6px 12px; cursor: pointer; border-radius: 8px; }
        .l-btn.active { background: #fff; color: #000; }

        .mission-item { background: rgba(255,255,255,0.02); padding: 22px; border-radius: 22px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="toast" class="toast"><span id="toast-icon"></span> <span id="toast-msg"></span></div>

<div class="app-container">
    <header class="brand-header">
        <div class="brand-top">
            <div class="logo-box">
                <span class="big-candy">🍬</span>
                <div style="font-weight:800; font-size:20px; letter-spacing:-1px; color: #fff;">CANDY CLOUD</div>
            </div>
            <div class="lang-pill">
                <button class="l-btn" id="btn-es" onclick="setLang('es')">ES</button>
                <button class="l-btn" id="btn-en" onclick="setLang('en')">EN</button>
            </div>
        </div>
        <div class="value-badge">VALUE: 1 🍬 = 1.00 USDT</div>
    </header>

    <div id="v-home">
        <div class="balance-card">
            <div style="font-size: 11px; color: #555; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; margin-bottom: 8px;" data-t="bal_label">Balance Neto</div>
            <div class="main-amount">$<span id="val-balance">0.0000</span></div>
            <div style="margin-top:15px; font-size:12px; font-weight: 800; background:rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding:8px 18px; border-radius:50px; display:inline-block;">
                <span data-t="candies">🍬 Caramelos</span>: <span id="val-candy" style="color:var(--accent)">0</span>
            </div>
        </div>

        <button class="prime-btn" id="task-btn" onclick="startTask()" data-t="btn_task">ADS VIDEO (0/5)</button>
        <button class="prime-btn" style="background:none; border:1px solid #1a1a1a; color:#555; font-size: 13px;" data-t="btn_withdraw">RETIRAR (0.02)</button>
    </div>

    <div id="v-earn" style="display:none;">
        <h2 data-t="earn_t" style="font-weight:800; font-size: 24px; margin-bottom: 25px; text-transform: uppercase;">Misiones</h2>
        <div class="mission-item">
            <div>
                <div style="font-weight: 800; font-size: 15px;" data-t="m1">Canal Oficial</div>
                <div style="color:var(--gold); font-size: 11px; font-weight: 800;">+1 🍬 Caramelo</div>
            </div>
            <button class="prime-btn" id="btn-c1" style="width:auto; padding:10px 20px; margin:0; border-radius: 12px; font-size:12px;" onclick="join(1)" data-t="join">UNIRSE</button>
        </div>
        <div class="mission-item">
            <div>
                <div style="font-weight: 800; font-size: 15px;" data-t="m2">Grupo VIP</div>
                <div style="color:var(--gold); font-size: 11px; font-weight: 800;">+1 🍬 Caramelo</div>
            </div>
            <button class="prime-btn" id="btn-c2" style="width:auto; padding:10px 20px; margin:0; border-radius: 12px; font-size:12px;" onclick="join(2)" data-t="join">UNIRSE</button>
        </div>
    </div>
</div>

<nav style="position:fixed; bottom:0; left:0; width:100%; background:rgba(5,8,15,0.98); display:flex; justify-content:space-around; padding:22px; border-top:1px solid #111; z-index:100; backdrop-filter: blur(10px);">
    <button onclick="view('home')" id="nav-h" style="background:none; border:none; color:#fff; font-weight:800; cursor:pointer; font-size: 12px;" data-t="nav_h">INICIO</button>
    <button onclick="view('earn')" id="nav-e" style="background:none; border:none; color:#444; font-weight:800; cursor:pointer; font-size: 12px;" data-t="nav_e">GANA</button>
</nav>

<script>
    const i18n = {
        es: {
            bal_label: "Balance Neto", candies: "🍬 Caramelos", btn_task: "VER VIDEO", btn_withdraw: "RETIRAR (0.02)",
            earn_t: "Misiones", m1: "Canal Oficial", m2: "Grupo VIP", join: "UNIRSE", nav_h: "INICIO", nav_e: "GANA",
            err_candies: "Misiones incompletas 🍬", ready: "Vuelva mañana 🌙", done: "LISTO"
        },
        en: {
            bal_label: "Net Balance", candies: "🍬 Candies", btn_task: "WATCH VIDEO", btn_withdraw: "WITHDRAW (0.02)",
            earn_t: "Missions", m1: "Official Channel", m2: "VIP Group", join: "JOIN", nav_h: "HOME", nav_e: "EARN",
            err_candies: "Missions incomplete 🍬", ready: "Come back tomorrow 🌙", done: "DONE"
        }
    };

    let db = { lang: 'es', balance: 0.0000, candies: 0, ch1: false, ch2: false, last: '', total: 0, taskProgress: 0 };

    function save() { localStorage.setItem('_candy_global_v2_final', JSON.stringify(db)); }
    function load() { 
        const data = localStorage.getItem('_candy_global_v2_final'); 
        if(data) db = JSON.parse(data); 
        setLang(db.lang); 
        update(); 
    }

    // ARREGLO DEL BOTÓN TRADUCIR
    function setLang(l) {
        db.lang = l;
        document.querySelectorAll('[data-t]').forEach(el => {
            const key = el.getAttribute('data-t');
            if(i18n[l][key]) el.innerText = i18n[l][key];
        });
        document.getElementById('btn-es').className = (l === 'es' ? 'l-btn active' : 'l-btn');
        document.getElementById('btn-en').className = (l === 'en' ? 'l-btn active' : 'l-btn');
        save();
    }

    function update() {
        document.getElementById('val-balance').innerText = db.balance.toFixed(4);
        document.getElementById('val-candy').innerText = db.candies;
        const btn = document.getElementById('task-btn');
        if(db.last === new Date().toDateString()) {
            btn.innerText = i18n[db.lang].ready;
            btn.style.opacity = "0.4";
            btn.onclick = null;
        } else {
            btn.innerText = `${i18n[db.lang].btn_task} (${db.taskProgress}/5)`;
        }
        if(db.ch1) setDone('btn-c1');
        if(db.ch2) setDone('btn-c2');
    }

    function setDone(id) {
        const b = document.getElementById(id);
        b.innerText = i18n[db.lang].done;
        b.classList.add('done');
        b.onclick = null;
    }

    // ARREGLO DE LAS TAREAS DE UNIRSE
    function join(n) { 
        if(n===1 && !db.ch1) { 
            window.open('https://t.me/CandyCloudoficial', '_blank'); 
            db.ch1 = true; db.candies++; 
        } else if(n===2 && !db.ch2) { 
            window.open('https://t.me/CandyCloudgroup', '_blank'); 
            db.ch2 = true; db.candies++; 
        }
        save(); update(); 
    }

    function startTask() {
        if(db.candies < 2) return showToast(i18n[db.lang].err_candies);
        if(db.last === new Date().toDateString()) return showToast(i18n[db.lang].ready);
        show_10763886().then(() => { finishStep(); }).catch(() => { showToast("Error Ads ❌"); });
    }

    function finishStep() {
        db.taskProgress++;
        if(db.taskProgress >= 5) {
            const cycle = [0.01, 0.002, 0.01, 0.008];
            db.balance += cycle[db.total % 4]; db.total++; 
            db.last = new Date().toDateString(); db.taskProgress = 0;
            showToast("Success! ✅");
        }
        save(); update();
    }

    function view(v) {
        document.getElementById('v-home').style.display = (v === 'home' ? 'block' : 'none');
        document.getElementById('v-earn').style.display = (v === 'earn' ? 'block' : 'none');
        document.getElementById('nav-h').style.color = (v === 'home' ? '#fff' : '#444');
        document.getElementById('nav-e').style.color = (v === 'earn' ? '#fff' : '#444');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.onload = load;
</script>
</body>
</html>
