<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lector de Imágenes · OCR Cálido</title>
    
    <!-- SDK de Telegram Mini App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tesseract.js para OCR (reconoce texto en imágenes) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #FFF3E0 0%, #FFE0B5 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tarjeta principal */
        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 248, 235, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 5px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 24px 20px 32px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 215, 170, 0.6);
        }

        /* Encabezado cálido */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #C25E2A, #E67E22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #B45F2B;
            margin-top: 8px;
            font-size: 0.9rem;
            opacity: 0.85;
        }

        /* Área de subida / imagen */
        .upload-area {
            background: #FFF7EF;
            border: 2px dashed #E7B27D;
            border-radius: 32px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #FFF2E5;
            border-color: #D9954A;
            transform: scale(0.99);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .upload-area span {
            color: #A45D2E;
            font-weight: 500;
        }

        .file-input {
            display: none;
        }

        /* Vista previa de la imagen */
        .preview-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 28px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
            border: 3px solid #FAD6A5;
            object-fit: contain;
            background: #FCE9D4;
        }

        /* Estado de carga */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #FFD39F;
            border-top: 4px solid #E67E22;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Caja del texto extraído */
        .result-box {
            background: #FEF5E8;
            border-radius: 28px;
            padding: 18px;
            margin: 16px 0 12px;
            border: 1px solid #F3D9BF;
            box-shadow: inset 0 1px 3px #0001, 0 4px 8px #0001;
        }

        .result-label {
            font-weight: 600;
            color: #BA6E3D;
            margin-bottom: 8px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-text {
            background: #FFFBF5;
            border-radius: 20px;
            padding: 16px;
            font-size: 1rem;
            line-height: 1.45;
            color: #3E2A1F;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: monospace;
            border: 1px solid #F0DEC8;
        }

        /* Botón copiar cálido */
        .copy-btn {
            background: linear-gradient(95deg, #E67E22, #F39C12);
            border: none;
            width: 100%;
            padding: 14px 0;
            border-radius: 44px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 12px rgba(230, 126, 34, 0.3);
            margin-top: 6px;
        }

        .copy-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 5px rgba(230, 126, 34, 0.4);
        }

        .copy-btn.copied {
            background: linear-gradient(95deg, #2E7D32, #43A047);
            box-shadow: 0 4px 10px rgba(46,125,50,0.3);
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #C28A59;
            margin-top: 24px;
        }

        /* toast flotante */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2C2A24;
            color: #FFE3C9;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>📖 Lector Mágico</h1>
            <p>Sube una foto con texto · lo extraemos al instante</p>
        </div>

        <!-- Zona subir imagen -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🖼️📸</div>
            <span>Toca para elegir una imagen</span>
            <input type="file" id="fileInput" class="file-input" accept="image/jpeg, image/png, image/webp, image/jpg">
        </div>

        <!-- Vista previa (opcional) -->
        <div id="previewContainer" class="preview-container" style="display: none;"></div>
        
        <!-- Loader -->
        <div id="loader" style="display: none;" class="loader">
            <div class="spinner"></div>
            <span style="color:#C76829;">✨ Leyendo la imagen ... ✨</span>
        </div>

        <!-- Resultado + texto -->
        <div id="resultSection" style="display: none;">
            <div class="result-box">
                <div class="result-label">
                    📝 <span>Texto encontrado:</span>
                </div>
                <div class="result-text" id="extractedText"></div>
            </div>
            <button class="copy-btn" id="copyButton">
                📋 Copiar texto
            </button>
        </div>
        <footer>La imagen no se guarda · todo ocurre en tu dispositivo 🌿</footer>
    </div>
    <div id="toastMsg" class="toast">📋 ¡Copiado!</div>

    <script>
        // Elementos del DOM
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const loaderDiv = document.getElementById('loader');
        const resultSection = document.getElementById('resultSection');
        const extractedTextSpan = document.getElementById('extractedText');
        const copyBtn = document.getElementById('copyButton');
        const toast = document.getElementById('toastMsg');

        // Función para mostrar notificaciones tipo toast
        function showToast(message, isError = false) {
            toast.textContent = message || (isError ? '❌ Error al copiar' : '📋 ¡Copiado!');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        // Función para copiar texto al portapapeles
        async function copyTextToClipboard(text) {
            if (!text || text.trim() === '') {
                showToast('✨ No hay texto para copiar', true);
                return false;
            }
            try {
                await navigator.clipboard.writeText(text);
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '✅ ¡Copiado!';
                showToast('📋 Texto copiado ✨');
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '📋 Copiar texto';
                }, 2000);
                return true;
            } catch (err) {
                console.error('Error al copiar: ', err);
                // fallback para navegadores antiguos
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('📋 Copiado (método alternativo)');
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '📋 Copiar texto';
                }, 1500);
                return true;
            }
        }

        // Evento para abrir selector de archivos
        uploadArea.addEventListener('click', (e) => {
            fileInput.click();
        });

        // Cuando el usuario selecciona una imagen
        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Validar tipo
            if (!file.type.startsWith('image/')) {
                alert('Por favor selecciona una imagen válida (JPG, PNG)');
                return;
            }

            // Mostrar preview
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgPreview = document.createElement('img');
                imgPreview.src = e.target.result;
                imgPreview.classList.add('preview-img');
                previewContainer.innerHTML = '';
                previewContainer.appendChild(imgPreview);
                previewContainer.style.display = 'flex';
            };
            reader.readAsDataURL(file);

            // Ocultar resultado previo, mostrar loader
            resultSection.style.display = 'none';
            loaderDiv.style.display = 'flex';
            extractedTextSpan.innerText = '';

            try {
                // Usamos Tesseract.js para extraer texto
                // Configuramos idioma español + inglés (buena cobertura)
                const worker = await Tesseract.createWorker({
                    logger: m => console.log(m) // opcional, puedes ver progreso en consola
                });
                await worker.loadLanguage('spa+eng');
                await worker.initialize('spa+eng');
                
                // Reconocer texto desde el archivo
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();

                const cleanedText = text.trim() || "😕 No se encontró texto reconocible. ¿La imagen tiene letras claras?";
                
                // Mostrar texto y sección de resultados
                extractedTextSpan.innerText = cleanedText;
                resultSection.style.display = 'block';
                
                if(cleanedText.includes("No se encontró texto")){
                    // si no hay texto, sugerencia cálida.
                }
                
            } catch (error) {
                console.error('Error en OCR:', error);
                extractedTextSpan.innerText = "❌ Hubo un problema al leer la imagen. Intenta con otra foto mejor iluminada.";
                resultSection.style.display = 'block';
            } finally {
                loaderDiv.style.display = 'none';
            }
        });

        // Evento del botón copiar
        copyBtn.addEventListener('click', () => {
            const currentText = extractedTextSpan.innerText;
            if (currentText && currentText !== "😕 No se encontró texto reconocible. ¿La imagen tiene letras claras?" && !currentText.includes("problema")) {
                copyTextToClipboard(currentText);
            } else {
                showToast('📭 No hay texto válido para copiar', true);
            }
        });

        // Soporte para recibir archivos desde el bot de Telegram (opcional)
        if (window.Telegram && Telegram.WebApp) {
            const tg = Telegram.WebApp;
            tg.expand(); // expande la mini app a pantalla completa
            tg.ready();
            
            // Si se recibe un archivo directamente del chat (por MainButton o data)
            // es una integración extra: se puede implementar con un listener de initDataUnsafe
            // pero por ahora la funcionalidad manual funciona perfecto.
        }
    </script>
</body>
</html>
