<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CANDY STAKING GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src='//libtl.com/sdk.js' data-zone='10763886' data-sdk='show_10763886'></script>

    <style>
        :root { --main-pink: #ff007a; --bg-dark: #080a0d; --card-dark: #12161f; --text-muted: #6b7280; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 122, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 122, 0.05) 0%, transparent 40%);
            color: #fff; margin: 0; overflow: hidden; height: 100vh; 
            animation: glowBG 8s infinite alternate;
        }

        @keyframes glowBG { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

        .app-container { width: 100%; max-width: 450px; margin: 0 auto; padding: 25px; height: 100vh; overflow-y: auto; padding-bottom: 120px; position: relative; z-index: 1; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 25px; }
        .logo { font-weight: 800; font-size: 20px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--main-pink); border-radius: 50%; box-shadow: 0 0 15px var(--main-pink); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .notice-bar { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 12px; font-size: 11px; text-align: center; color: var(--text-muted); margin-bottom: 20px; font-weight: 600; }

        .balance-card {
            background: linear-gradient(145deg, #1a1f2b 0%, #12161f 100%);
            border-radius: 25px; padding: 30px; border: 1px solid rgba(255, 0, 122, 0.15); margin-bottom: 20px; position: relative; overflow: hidden;
        }

        .label { position: relative; color: var(--text-muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .amount { position: relative; font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; }
        .amount span { color: var(--main-pink); font-size: 16px; margin-left: 5px; }

        .btn-action { 
            background: var(--main-pink); color: #fff; border: none; width: 100%; padding: 20px; 
            border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; 
        }
        .btn-action:disabled { background: #1c222d; color: #4b5563; cursor: not-allowed; }

        /* BARRA DE PROGRESO */
        .progress-container { background: rgba(255,255,255,0.05); height: 10px; border-radius: 10px; margin: 15px 0; display: none; overflow: hidden; border: 1px solid rgba(255,0,122,0.1); }
        .progress-fill { height: 100%; background: var(--main-pink); width: 0%; transition: width 0.5s; box-shadow: 0 0 10px var(--main-pink); }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #1c222d; z-index: 100; }
        .nav-link { background: none; border: none; color: #4b5563; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .nav-link.active { color: var(--main-pink); }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 12px 25px; border-radius: 10px; font-weight: 800; font-size: 13px; transition: 0.4s; z-index: 10000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast" class="toast">System Active</div>

<div class="app-container">
    <div class="header">
        <div class="logo"><div class="dot"></div> CANDY STAKING</div>
    </div>

    <div id="v-home">
        <div class="balance-card">
            <div class="label">Bonus Asset (Locked)</div>
            <div class="amount" style="font-size: 28px; color: #9ca3af;">$<span id="bonus-val">0.00</span> <span>USDT</span></div>
            <div style="height: 1px; background: rgba(255,255,255,0.05); margin: 20px 0;"></div>
            <div class="label">Withdrawable Profit</div>
            <div class="amount">$<span id="profit-val">0.0000</span> <span>USDT</span></div>
        </div>
        <button class="btn-action" onclick="openWithdraw()">Withdraw Money</button>
        <div id="withdraw-history" style="margin-top:20px;"></div>
    </div>

    <div id="v-stake" style="display:none;">
        <div class="balance-card" style="text-align: center;">
            <div style="font-size: 40px; margin-bottom: 15px;">⛏️</div>
            <div class="label">Mining Center</div>
            <div class="progress-container" id="p-cont"><div class="progress-fill" id="p-fill"></div></div>
            <p id="st-desc" style="font-size: 14px; color: #9ca3af;">Start your 24h mining cycle.</p>
            <button class="btn-action" id="st-btn" style="margin-top: 15px;" onclick="handleStake()">Stake Bonus</button>
        </div>
    </div>

    <div id="v-earn" style="display:none;">
        <div class="mission-item"><div class="mission-text"><b>Official Channel</b><span>+$1.00 USDT</span></div><button class="btn-action" id="b1" style="width:auto; padding:10px;" onclick="join(1)">Join</button></div>
        <div class="mission-item"><div class="mission-text"><b>Official Group</b><span>+$1.00 USDT</span></div><button class="btn-action" id="b2" style="width:auto; padding:10px;" onclick="join(2)">Join</button></div>
    </div>

    <div id="v-guide" style="display:none; font-size: 13px; color: #9ca3af; line-height: 1.6;">
        1. Earn $2.00 Bonus in Boost.<br>2. Stake daily for 24h.<br>3. Min withdraw: $0.02 USDT.
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-link active" id="n-home" onclick="view('home')">Home</button>
    <button class="nav-link" id="n-stake" onclick="view('stake')">Stake</button>
    <button class="nav-link" id="n-earn" onclick="view('earn')">Boost</button>
    <button class="nav-link" id="n-guide" onclick="view('guide')">Info</button>
</nav>

<script>
    const TG_TOKEN = "8746370321:AAHLrn8OHEPNqyOIqY75Q4ocBVOgsZ8GI34";
    const CHISMOSO = "@ALSKSNNSLSMS";
    
    // nextClaim almacena la fecha exacta en milisegundos de cuando termina el ciclo
    let db = { bonus: 0.00, profit: 0.0000, ch1: false, ch2: false, total: 0, history: [], nextClaim: 0 };

    function save() { localStorage.setItem('_candy_v7_final_pro', JSON.stringify(db)); }
    function load() { 
        const data = localStorage.getItem('_candy_v7_final_pro');
        if(data) db = JSON.parse(data);
        update();
        setInterval(updateStakeUI, 1000); // Actualiza la barra y el tiempo cada segundo
    }

    function updateStakeUI() {
        const btn = document.getElementById('st-btn');
        const desc = document.getElementById('st-desc');
        const pCont = document.getElementById('p-cont');
        const pFill = document.getElementById('p-fill');
        const now = Date.now();
        const dayMs = 24 * 60 * 60 * 1000;

        if (db.nextClaim > now) {
            // CICLO EN CURSO
            pCont.style.display = "block";
            let elapsed = dayMs - (db.nextClaim - now);
            pFill.style.width = (elapsed / dayMs * 100) + "%";
            
            let diff = db.nextClaim - now;
            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            btn.innerText = `WAIT ${h}h ${m}m ${s}s`;
            btn.disabled = true;
            desc.innerText = "Mining in progress... Your USDT is being generated.";
        } else if (db.nextClaim !== 0) {
            // LISTO PARA RECLAMAR
            pCont.style.display = "none";
            btn.innerText = "CLAIM PROFIT 💰";
            btn.disabled = false;
            desc.innerText = "24h Cycle Complete! Collect your reward.";
        } else {
            // INICIO
            btn.innerText = "STAKE $2.00 BONUS";
            btn.disabled = false;
        }
    }

    function handleStake() {
        if (db.nextClaim !== 0 && Date.now() >= db.nextClaim) {
            const cycle = [0.01, 0.002, 0.01, 0.008, 0.01];
            db.profit += cycle[db.total % 5];
            db.total++;
            db.nextClaim = 0;
            save(); update();
            showToast("Reward Claimed! ✅");
            view('home');
        } else {
            if(db.bonus < 2.0) return showToast("Need $2.00 Bonus 🔒");
            show_10763886().then(() => {
                db.nextClaim = Date.now() + (24 * 60 * 60 * 1000);
                save(); updateStakeUI();
                showToast("Mining Started! ⛏️");
            });
        }
    }

    function update() {
        document.getElementById('bonus-val').innerText = db.bonus.toFixed(2);
        document.getElementById('profit-val').innerText = db.profit.toFixed(4);
        if(db.ch1) setDone('b1'); if(db.ch2) setDone('b2');
    }

    function join(n) {
        if(n===1 && !db.ch1) { window.open('https://t.me/CandyCloudoficial'); db.ch1=true; db.bonus += 1.0; }
        else if(n===2 && !db.ch2) { window.open('https://t.me/CandyCloudgroup'); db.ch2=true; db.bonus += 1.0; }
        save(); update();
    }

    function setDone(id) {
        const el = document.getElementById(id);
        el.innerText = "Verified"; el.disabled = true;
    }

    function view(v) {
        ['home','stake','earn','guide'].forEach(x => document.getElementById('v-'+x).style.display = (x===v?'block':'none'));
        document.querySelectorAll('.nav-link').forEach(i => i.classList.remove('active'));
        document.getElementById('n-'+v).classList.add('active');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function openWithdraw() {
        if(db.profit < 0.02) return showToast("Min: $0.02 USDT");
        let w = prompt("Enter your Polygon Wallet:");
        if(w && w.length > 15) {
            const amt = db.profit.toFixed(4);
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHISMOSO}&text=${encodeURIComponent('🚀 RETIRO: $'+amt+'\nWallet: '+w)}`);
            db.profit = 0; save(); update();
            showToast("Request Sent! ✅");
        }
    }

    window.onload = load;
</script>
</body>
</html>
