<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Staking Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary-accent: #00d2ff;
            --secondary-accent: #3a7bd5;
            --text-main: #f0f0f0;
            --text-dim: #a0a0a0;
            --button-grad: linear-gradient(145deg, #00d2ff, #3a7bd5);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor Principal */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Encabezado */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: var(--button-grad);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* Tarjeta de Saldo "Cremosa" */
        .balance-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 38px;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(to right, #fff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sección de Bono Congelado */
        .bonus-box {
            background: rgba(0, 210, 255, 0.1);
            border: 1px dashed var(--primary-accent);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .lock-icon { font-size: 20px; }

        /* Botones Estilo Juego */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: var(--button-grad);
            border: none;
            border-radius: 18px;
            padding: 15px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            text-align: center;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 210, 255, 0.2);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: none;
        }

        /* Sección de Inversión */
        .stats-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .stat-label { color: var(--text-dim); }
        .stat-value { font-weight: 600; color: #00ff88; }

        /* Navegación Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            text-align: center;
            color: var(--text-dim);
            font-size: 11px;
            text-decoration: none;
        }

        .nav-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .active { color: var(--primary-accent); }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-info">
            <div class="avatar">U</div>
            <span>Hola, Usuario</span>
        </div>
        <div style="font-size: 24px;">🔔</div>
    </div>

    <div class="balance-card">
        <div class="balance-label">Cartera Total</div>
        <div class="balance-amount">0.00 USDT</div>
        
        <div class="bonus-box">
            <span>🔒 Bono de Bienvenida</span>
            <span style="font-weight: 800;">2.00 USDT</span>
        </div>
        <p style="font-size: 12px; color: var(--text-dim); margin-top: 10px;">
            Este bono se activará automáticamente al iniciar el staking.
        </p>
    </div>

    <div class="btn-group">
        <button class="btn">Recargar</button>
        <button class="btn btn-secondary">Retirar</button>
    </div>

    <div class="stats-section">
        <h3 style="margin-top: 0; font-size: 18px;">Minería en la Nube</h3>
        <div class="stat-item">
            <span class="stat-label">Inversión Activa</span>
            <span class="stat-value">2.00 USDT</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Ganancia Diaria</span>
            <span class="stat-value">+ 0.02 USDT</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Estado</span>
            <span class="stat-value" style="color: #00d2ff;">Trabajando...</span>
        </div>
        
        <button class="btn" style="width: 100%; margin-top: 10px; background: #00ff88; color: #000;">
            ESTACAR AHORA
        </button>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active">🏠<br>Inicio</a>
    <a href="#" class="nav-item">👥<br>Equipo</a>
    <a href="#" class="nav-item">📈<br>Staking</a>
    <a href="#" class="nav-item">⚙️<br>Perfil</a>
</div>

</body>
</html>
