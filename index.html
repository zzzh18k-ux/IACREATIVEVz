<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staking Secure Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --gold: #c9a86a;
            --green: #2ea043;
            --text: #f0f6fc;
            --muted: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            user-select: none;
        }

        .app {
            width: 100%; max-width: 450px;
            padding: 20px; padding-bottom: 100px;
        }

        /* Espacio para Anuncios (ADSGRAM) */
        .ad-slot {
            width: 100%; height: 50px;
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--muted);
            margin: 10px 0; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: var(--muted);
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 20px; }

        .main-card {
            background: var(--card);
            border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; margin-bottom: 20px;
        }

        .balance-num { font-size: 40px; font-weight: 700; margin: 10px 0; color: var(--gold); }

        .progress-container {
            background: #21262d; height: 10px;
            border-radius: 5px; margin: 20px 0; overflow: hidden;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--gold), #f3e5ab);
            transition: width 0.5s ease;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn {
            background: #21262d; border: 1px solid #30363d;
            color: white; padding: 15px; border-radius: 15px;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-main { background: var(--gold); color: #000; border: none; width: 100%; margin-top: 20px; font-size: 16px; }

        .footer-nav {
            position: fixed; bottom: 0; max-width: 450px; width: 100%;
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #30363d;
        }

        .nav-item { font-size: 12px; color: var(--muted); text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* Notificaciones flotantes */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: black; padding: 10px 20px;
            border-radius: 10px; font-weight: 600; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="toast">Mensaje enviado</div>

<div class="app">
    <div class="ad-slot">PUBLICIDAD ADSGRAM AQUÍ</div>

    <div class="header">
        <span style="font-weight:700">STAKING <span style="color:var(--gold)">SECURE</span></span>
        <span onclick="showToast('Sincronizado con la Red')">🟢 Activo</span>
    </div>

    <div class="main-card">
        <span style="color:var(--muted)">Balance Retirable</span>
        <div class="balance-num" id="balance">0.00 <span style="font-size:18px">USDT</span></div>
        
        <div style="display:flex; justify-content:space-between; font-size:12px">
            <span>Staking en curso</span>
            <span id="prog-text">0%</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div style="font-size:13px; color: var(--green)" id="status-text">
            Esperando activación...
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn" onclick="showToast('Mínimo de recarga: 10 USDT')">📥 Recargar</button>
        <button class="btn" onclick="showToast('Mínimo de retiro: 5 USDT')">📤 Retirar</button>
    </div>

    <button class="btn btn-main" id="stakeBtn" onclick="startStaking()">INICIAR STAKING ($2.00 BONO)</button>

    <div style="margin-top:20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; font-size: 13px;">
        <b style="color:var(--gold)">Historial Reciente:</b>
        <div style="margin-top:10px; color:var(--muted)">• Bono de bienvenida: +2.00 USDT (Bloqueado)</div>
    </div>

    <div class="ad-slot" style="margin-top:20px">PUBLICIDAD MONETAG AQUÍ</div>
</div>

<nav class="footer-nav">
    <div class="nav-item active">🏠<br>Inicio</div>
    <div class="nav-item" onclick="showToast('Próximamente...')">👥<br>Referidos</div>
    <div class="nav-item" onclick="showToast('Sección de Mercado bloqueada')">📊<br>Mercado</div>
    <div class="nav-item" onclick="showToast('Cargando Perfil...')">👤<br>Perfil</div>
</nav>

<script>
    let balance = 0.00;
    let isStaking = false;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    function startStaking() {
        if(isStaking) {
            showToast("El staking ya está activo");
            return;
        }
        
        const btn = document.getElementById('stakeBtn');
        const bar = document.getElementById('bar');
        const progText = document.getElementById('prog-text');
        const statusText = document.getElementById('status-text');

        btn.innerText = "PROCESANDO CONTRATO...";
        btn.style.opacity = "0.5";

        setTimeout(() => {
            isStaking = true;
            btn.innerText = "STAKING EN MARCHA";
            statusText.innerText = "✓ Generando 0.02 USDT diarios";
            statusText.style.color = "#2ea043";
            
            // Animación de la barra
            let progress = 0;
            const interval = setInterval(() => {
                progress += 1;
                bar.style.width = progress + "%";
                progText.innerText = progress + "%";
                
                if(progress >= 100) {
                    clearInterval(interval);
                    balance += 0.02;
                    document.getElementById('balance').innerHTML = balance.toFixed(2) + ' <span style="font-size:18px">USDT</span>';
                    showToast("¡Ganancia diaria acreditada!");
                    progress = 0; // Reinicia el ciclo
                }
            }, 500); // 500ms para que se mueva rápido y el revisor lo vea
            
            showToast("Bono de $2.00 Activado");
        }, 1500);
    }
</script>

</body>
</html>
