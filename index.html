<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CANDY STAKING GLOBAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src='//libtl.com/sdk.js' data-zone='10763886' data-sdk='show_10763886'></script>

    <style>
        :root { --main-pink: #ff007a; --bg-dark: #080a0d; --card-dark: #12161f; --text-muted: #6b7280; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 0, 122, 0.05) 0%, transparent 40%);
            color: #fff; margin: 0; overflow: hidden; height: 100vh; 
        }

        .app-container { width: 100%; max-width: 450px; margin: 0 auto; padding: 25px; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        
        /* TARJETAS Y DISEÑO */
        .balance-card {
            background: linear-gradient(145deg, #1a1f2b 0%, #12161f 100%);
            border-radius: 25px; padding: 30px; border: 1px solid rgba(255, 0, 122, 0.15); margin-bottom: 20px;
        }

        .label { color: var(--text-muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .amount { font-size: 36px; font-weight: 800; }
        .amount span { color: var(--main-pink); font-size: 16px; margin-left: 5px; }

        .btn-action { 
            background: var(--main-pink); color: #fff; border: none; width: 100%; padding: 20px; 
            border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; 
        }
        .btn-action:disabled { background: #1c222d; color: #4b5563; }

        /* HISTORIAL DE RETIRO ESTILIZADO */
        .history-item { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; border-left: 4px solid #10b981;
        }
        .hist-info b { font-size: 14px; display: block; }
        .hist-info span { font-size: 11px; color: var(--text-muted); }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #1c222d; }
        .nav-link { background: none; border: none; color: #4b5563; font-size: 10px; font-weight: 800; cursor: pointer; }
        .nav-link.active { color: var(--main-pink); text-shadow: 0 0 10px var(--main-pink); }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #fff; color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 800; transition: 0.5s; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast" class="toast">Action Verified</div>

<div class="app-container">
    <div id="v-home">
        <div class="balance-card">
            <div class="label">Balance Available</div>
            <div class="amount">$<span id="profit-val">0.0000</span> <span>USDT</span></div>
        </div>
        <button class="btn-action" onclick="openWithdraw()">Withdraw Profit</button>

        <div style="margin-top:30px;">
            <div class="label">Withdrawal History</div>
            <div id="hist-list">
                <p style="color:var(--text-muted); font-size:12px; text-align:center; margin-top:20px;">No recent transactions.</p>
            </div>
        </div>
    </div>

    <div id="v-stake" style="display:none;">
        <div class="balance-card" style="text-align: center;">
            <div style="font-size: 40px; margin-bottom: 15px;">⛏️</div>
            <div class="label">Mining Center</div>
            <p id="st-desc" style="font-size: 14px; color: #9ca3af;">Click once to start your daily rewards cycle.</p>
            <button class="btn-action" id="st-btn" onclick="activateMining()">Stake Bonus</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-link active" id="n-home" onclick="view('home')">Home</button>
    <button class="nav-link" id="n-stake" onclick="view('stake')">Stake</button>
    <button class="nav-link" id="n-guide" onclick="view('guide')">Info</button>
</nav>

<script>
    const TG_TOKEN = "8746370321:AAHLrn8OHEPNqyOIqY75Q4ocBVOgsZ8GI34";
    const CHISMOSO = "@ALSKSNNSLSMS";
    
    let db = { bonus: 0, profit: 0.0000, history: [], active: false, lastAutoClaim: 0, total: 0 };

    function save() { localStorage.setItem('_candy_pro_v8', JSON.stringify(db)); }
    function load() { 
        const data = localStorage.getItem('_candy_pro_v8');
        if(data) db = JSON.parse(data);
        updateUI();
        setInterval(checkAutoRewards, 1000); 
    }

    function checkAutoRewards() {
        if (!db.active) return;
        const now = Date.now();
        const dayMs = 24 * 60 * 60 * 1000;

        if (now - db.lastAutoClaim >= dayMs) {
            const cycle = [0.01, 0.002, 0.01, 0.008, 0.01];
            let reward = cycle[db.total % 5];
            db.profit += reward;
            db.total++;
            db.lastAutoClaim = now;
            save(); updateUI();
            showToast("🎁 Reward Auto-Credited!");
        }
    }

    function activateMining() {
        if(db.active) return showToast("⚠️ Already Mining");
        show_10763886().then(() => {
            db.active = true;
            db.lastAutoClaim = Date.now();
            db.profit += 0.01; // Primer pago guía
            db.total = 1;
            save(); updateUI();
            showToast("⛏️ Mining Cycle Started!");
            view('home');
        });
    }

    function updateUI() {
        document.getElementById('profit-val').innerText = db.profit.toFixed(4);
        
        // Renderizar Historial
        const hList = document.getElementById('hist-list');
        if(db.history.length > 0) {
            hList.innerHTML = db.history.map(item => `
                <div class="history-item">
                    <div class="hist-info"><b>USDT Withdrawal</b><span>${item.date}</span></div>
                    <div style="text-align:right;"><b>$${item.amt}</b><br><small style="color:#10b981;font-weight:800;">SUCCESS</small></div>
                </div>
            `).join('');
        }
    }

    function openWithdraw() {
        if(db.profit < 0.02) return showToast("❌ Minimum $0.02 USDT");
        let w = prompt("Enter your USDT Wallet:");
        if(w && w.length > 15) {
            const amount = db.profit.toFixed(4);
            // Mensaje Profesional al Bot Chismoso
            const msg = `🚀 *NUEVO RETIRO DETECTADO*\n\n💰 Monto: *${amount} USDT*\n👤 Wallet: \`${w}\`\n📅 Fecha: ${new Date().toLocaleString()}\n\n✅ _Estado: Procesando automático_`;
            
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHISMOSO}&parse_mode=Markdown&text=${encodeURIComponent(msg)}`);
            
            // Guardar en historial local
            db.history.unshift({ amt: amount, date: new Date().toLocaleDateString() });
            db.profit = 0;
            save(); updateUI();
            showToast("✅ Withdrawal Request Sent!");
        }
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function view(v) {
        ['home','stake','guide'].forEach(x => document.getElementById('v-'+x).style.display = (x===v?'block':'none'));
        document.querySelectorAll('.nav-link').forEach(i => i.classList.remove('active'));
        document.getElementById('n-'+v).classList.add('active');
    }

    window.onload = load;
</script>
</body>
</html>
