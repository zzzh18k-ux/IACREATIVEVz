<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureum Rewards | Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #F9F7F2;
            --bronze: #A67C52;
            --bronze-light: #D9C5B2;
            --charcoal: #2C2C2C;
            --gold-gradient: linear-gradient(135deg, #A67C52 0%, #735238 100%);
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--ivory);
            color: var(--charcoal);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- FRAME PROFESIONAL --- */
        .viewport {
            background: var(--ivory);
            width: 100%;
            max-width: 420px;
            height: 92vh;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(166, 124, 82, 0.2);
        }

        /* --- DASHBOARD SUPERIOR --- */
        .dashboard {
            padding: 40px 30px 20px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 30px;
        }

        .balance-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #F0EDE5;
        }

        .balance-title {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--bronze);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .balance-value {
            font-size: 2.2rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .progress-container {
            margin-top: 15px;
            background: #EEE;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--bronze);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- NODOS DE ACCESO (BOTONES) --- */
        .nodes-grid {
            flex: 1;
            padding: 20px 30px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .node-item {
            background: white;
            border: 1px solid #F0EDE5;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .node-item:active { transform: scale(0.96); }

        .node-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--soft-brown);
        }

        .node-value {
            display: block;
            font-size: 0.9rem;
            margin-top: 5px;
            font-weight: 600;
        }

        /* --- ESTADO DE CARGA / BLOQUEO --- */
        .node-item.disabled {
            opacity: 0.4;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        /* --- ACTION CENTER --- */
        .action-center {
            padding: 30px;
            background: white;
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.02);
        }

        .btn-premium {
            background: var(--gold-gradient);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        /* --- NOTIFICACIONES --- */
        #notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--charcoal);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 0.75rem;
            display: none;
            z-index: 100;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="viewport">
        <div id="notification">NOTIFICACIÓN</div>

        <header class="dashboard">
            <h1 class="brand-name">Aureum</h1>
            <div class="balance-card">
                <span class="balance-title">CURRENT BALANCE</span>
                <div class="balance-value">
                    <span id="starBalance">0</span>
                    <span style="font-size: 1rem; color: var(--bronze);">★</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div style="font-size: 0.6rem; margin-top: 10px; letter-spacing: 1px;">
                    EQUIVALENT: <span id="diamondValue">0.00</span> DIAMONDS
                </div>
            </div>
        </header>

        <section class="nodes-grid" id="nodesGrid">
            </section>

        <footer class="action-center">
            <button class="btn-premium" onclick="handleWithdraw()">EXCHANGE ASSETS</button>
        </footer>
    </div>

    <script>
        const CONFIG = {
            ADS_URL: "https://www.google.com", // Reemplazar por link directo
            REQUIRED_TIME: 10,
            REWARD: 10,
            GOAL: 5000
        };

        let stars = parseInt(localStorage.getItem('aureum_stars')) || 0;
        let isProcessing = false;

        function init() {
            renderNodes();
            updateUI();
        }

        function renderNodes() {
            const grid = document.getElementById('nodesGrid');
            for (let i = 1; i <= 10; i++) {
                const node = document.createElement('div');
                node.className = 'node-item';
                node.id = `node-${i}`;
                node.innerHTML = `
                    <span class="node-label">NODE 0${i}</span>
                    <span class="node-value">ACCESS</span>
                `;
                node.onclick = () => startNode(i);
                grid.appendChild(node);
            }
        }

        function updateUI() {
            document.getElementById('starBalance').innerText = stars.toLocaleString();
            const diamonds = (stars / 10).toFixed(2);
            document.getElementById('diamondValue').innerText = diamonds;
            
            const progress = (stars / CONFIG.GOAL) * 100;
            document.getElementById('progressBar').style.width = Math.min(progress, 100) + "%";
            localStorage.setItem('aureum_stars', stars);
        }

        function startNode(index) {
            if (isProcessing) return;

            isProcessing = true;
            window.open(CONFIG.ADS_URL, '_blank');
            
            const node = document.getElementById(`node-${index}`);
            node.classList.add('disabled');
            
            let timeLeft = CONFIG.REQUIRED_TIME;
            const timer = setInterval(() => {
                timeLeft--;
                node.querySelector('.node-value').innerText = `${timeLeft}S`;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    node.querySelector('.node-value').innerText = 'COMPLETE';
                    finalizeNode(node);
                }
            }, 1000);
        }

        // Sistema Anti-Trampa mejorado
        window.onfocus = () => {
            if (isProcessing) {
                // Si el usuario regresa y hay un cronómetro activo, se invalida
                location.reload(); // Reseteo total para evitar bypass
            }
        };

        function finalizeNode(nodeElement) {
            isProcessing = false;
            stars += CONFIG.REWARD;
            updateUI();
            notify("ASSET SECURED");
            setTimeout(() => {
                nodeElement.classList.remove('disabled');
                nodeElement.querySelector('.node-value').innerText = 'ACCESS';
            }, 2000);
        }

        function notify(msg) {
            const el = document.getElementById('notification');
            el.innerText = msg;
            el.style.display = "block";
            setTimeout(() => el.style.display = "none", 2000);
        }

        function handleWithdraw() {
            if (stars < CONFIG.GOAL) {
                notify("INSUFFICIENT BALANCE");
            } else {
                notify("TRANSFER INITIATED");
            }
        }

        init();
    </script>
</body>
</html>
